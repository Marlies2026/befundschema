<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Befundschema ã Stand</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; color: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 12px; }
h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 10px; }
.tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
.tab { font-size: 10px; padding: 4px 10px; border: 1px solid #bbb; border-radius: 4px; background: #fff; color: #666; cursor: pointer; letter-spacing: 1px; }
.tab.active { background: #222; color: #fff; border-color: #222; }
.legend { display: flex; gap: 10px; align-items: center; font-size: 10px; color: #666; margin-bottom: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }
#schema-container { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 8px; margin-bottom: 10px; }
.status-bar { width: 100%; max-width: 420px; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #666; min-height: 32px; margin-bottom: 8px; display: flex; align-items: center; }
.name { color: #111; font-weight: 600; }
.state-restricted { color: #cc0000; font-weight: 600; }
.state-improved { color: #cc8800; font-weight: 600; }
.state-free { color: #336600; font-weight: 600; }
.mic-status { width: 100%; max-width: 420px; background: #fff; border: 2px solid #ccc; border-radius: 6px; padding: 6px 12px; font-size: 11px; color: #666; min-height: 28px; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.mic-status.listening { border-color: #cc0000; background: #fff5f5; }
.mic-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.mic-dot.active { background: #cc0000; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.speech-log { width: 100%; max-width: 420px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 10px; color: #888; min-height: 24px; font-style: italic; margin-bottom: 8px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; width: 100%; max-width: 420px; }
button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; font-size: 11px; cursor: pointer; letter-spacing: 1px; background: #fff; color: #333; }
#micStartBtn { background: #fff0f0; color: #cc0000; border-color: #cc0000; display: none; }
#exportBtn { background: #f0fff0; color: #336600; border-color: #336600; }
#resetBtn { background: #fff8f0; color: #996600; border-color: #cc8800; }
.hint { font-size: 9px; color: #aaa; text-align: center; margin-bottom: 4px; }
</style>
</head>
<body>
<h1>Befundschema</h1>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'Stand')">Stand</button>
  <button class="tab" onclick="switchTab(this,'Sitz')">Sitz</button>
  <button class="tab" onclick="switchTab(this,'Rippe')">Rippe</button>
  <button class="tab" onclick="switchTab(this,'Rû¥ck')">Rû¥ck</button>
  <button class="tab" onclick="switchTab(this,'Zusatz')">Zusatz</button>
  <button class="tab" onclick="switchTab(this,'SchûÊdel')">SchûÊdel</button>
</div>
<div class="legend">
  <span><span class="dot" style="background:#cc0000"></span>eingeschrûÊnkt</span>
  <span><span class="dot" style="background:#cc8800"></span>reaktiv</span>
  <span><span class="dot" style="background:#336600"></span>frei</span>
</div>
<div id="schema-container">
  <svg id="sv" viewBox="-45 -70 390 720" style="display:block;width:320px;max-width:100%;"></svg>
</div>
<div class="status-bar" id="sb">Symbol antippen oder sprechen</div>
<div class="mic-status" id="micStatus">
  <span class="mic-dot" id="micDot"></span>
  <span id="micText">Mikrofon wird gestartetãÎ</span>
</div>
<div class="speech-log" id="speechLog">Warte auf SpracheingabeãÎ</div>
<p class="hint">1û = eingeschrûÊnkt ôñ 2û = reaktiv ôñ 3û = frei ôñ 4û = zurû¥cksetzen</p>
<div class="controls">
  <button id="micStartBtn" onclick="startRecognition()">ÞÊ Mikrofon starten</button>
  <button id="exportBtn" onclick="exportBefund()">Þ¡ Exportieren</button>
  <button id="resetBtn" onclick="resetAll()">ã¤ Zurû¥cksetzen</button>
</div>

<script>
function switchTab(btn, name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sb').textContent='Tab: '+name+' (wird noch gebaut)';
}

// ããã KONSTANTEN ããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
const svg=document.getElementById('sv');
const NS="http://www.w3.org/2000/svg";
const CX=150,SW=2;
const LX=50,RX=250;
const ANGLE=12,ARM=100;
const r=ANGLE*Math.PI/180;
const dx=ARM*Math.cos(r),dy=ARM*Math.sin(r);
const CY_TOP=55,GAP=40,LGAP=80;
const Y1=CY_TOP+GAP,Y2=Y1+LGAP,Y3=Y2+LGAP;
const CY_BOT=Y3+GAP;
const SKOL_Y=(Y1+Y2)/2;
const ARROW_OVERLAP=8,TIP=9;
const CIRCLE_EXTRA=25;
const FX_L=Math.round(CX-dx),FX_R=Math.round(CX+dx);
const FY=Math.round(CY_BOT+dy)+18+CIRCLE_EXTRA;
const TRI_L_X=LX+20,TRI_R_X=RX-20;
const LABEL_OFFSET=35;
const P_L1=98,P_L2=123,P_R1=177,P_R2=202;
const CR=14;
const SC_L_X=-20,SC_R_X=320,SC_Y=Y1;
const HWS_D=28;
const HWS_Y=CY_TOP-dy-18;
const HWS_L_CX=CX-dx/2,HWS_R_CX=CX+dx/2;
const WS_Y=(Y2+Y3)/2,WS_L_CX=TRI_L_X,WS_R_CX=TRI_R_X;
const PL=32,PR=268;

const COL='#222222',COL_DASH='#aaaaaa',COL_BG='#ffffff';
const STATES=['neutral','restricted','improved','free'];
const LABELS={neutral:'neutral',restricted:'eingeschrûÊnkt',improved:'reaktiv',free:'frei'};
const SCOL={neutral:COL,restricted:'#cc0000',improved:'#cc8800',free:'#336600'};
const FCOL={neutral:COL,restricted:'#cc0000',improved:'#cc8800',free:'#336600'};
const DCOL={neutral:COL_DASH,restricted:'#cc0000',improved:'#cc8800',free:'#336600'};
const TCOL={neutral:COL,restricted:'#cc0000',improved:'#cc8800',free:'#336600'};

const sm={};
const reg={};

function el(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e;}
function cs(id){return STATES[(STATES.indexOf(sm[id])+1)%4];}
function reg2(id,fn,label){sm[id]='neutral';reg[id]={cycle:fn,label};}
function showSb(label,state){
  const sb=document.getElementById('sb');
  if(state==='neutral')sb.innerHTML=label+' ã zurû¥ckgesetzt';
  else{const cls='state-'+state;sb.innerHTML=`<span class="name">${label}</span> ã <span class="${cls}">${LABELS[state]}</span>`;}
}
function mkl(x1,y1,x2,y2,extra={}){return el('line',{x1,y1,x2,y2,stroke:COL,'stroke-width':SW,'stroke-linecap':'round',...extra});}
function hit(x,y,w,h){return el('rect',{x,y,width:w,height:h,fill:'transparent'});}
function stxt(x,y,s,sz=8){const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':sz,fill:'#666','pointer-events':'none'});t.textContent=s;return t;}

function ctxt(id,x,y,s,sz,label,anchor='middle'){
  const t=el('text',{x,y,'text-anchor':anchor,'dominant-baseline':'middle','font-size':sz,fill:COL});
  t.style.cursor='pointer';t.textContent=s;svg.appendChild(t);
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',TCOL[next]);showSb(label,next);};
  reg2(id,fn,label);t.addEventListener('click',fn);return t;
}

function plus(id,x,y,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL});
  t.style.cursor='pointer';t.textContent='+';svg.appendChild(t);
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',FCOL[next]);showSb(label||id,next);};
  reg2(id,fn,label||id);t.addEventListener('click',fn);return t;
}

function circle(id,x,y,label){
  sm[id]='neutral';
  const c=el('circle',{cx:x,cy:y,r:CR,fill:COL_BG,stroke:COL,'stroke-width':SW});
  c.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;c.setAttribute('stroke',SCOL[next]);showSb(label,next);};
  reg2(id,fn,label);c.addEventListener('click',fn);return c;
}

// Schulterkreis mit Auto-EinfûÊrben wenn F/ABD/KIR/KAR aktiv
function shoulderCircle(side){
  const cx=side==='L'?SC_L_X:SC_R_X,cy=SC_Y;
  const circ=circle(`Schulter-${side}`,cx,cy,`Schulter ${side}`);

  function updateCircle(){
    const tests=[`F-${side}`,`ABD-${side}`,`KIR-${side}`,`KAR-${side}`];
    const active=tests.find(id=>sm[id]&&sm[id]!=='neutral');
    if(active) circ.setAttribute('stroke',SCOL[sm[active]]);
    else if(sm[`Schulter-${side}`]==='neutral') circ.setAttribute('stroke',COL);
  }

  function makeSub(id,x,y,s,sz,label){
    const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':sz,fill:COL});
    t.style.cursor='pointer';t.textContent=s;svg.appendChild(t);
    const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',TCOL[next]);updateCircle();showSb(label,next);};
    reg2(id,fn,label);t.addEventListener('click',fn);
  }

  makeSub(`ABD-${side}`,cx,cy-CR-9,'ABD',8,`Abduktion Schulter ${side}`);
  makeSub(`F-${side}`,cx,cy-CR-20,'F',9,`Flexion Schulter ${side}`);
  makeSub(`KIR-${side}`,cx,cy+CR+10,'KIR',8,`Komplette Innenrotation Schulter ${side}`);
  makeSub(`KAR-${side}`,cx,cy+CR+22,'KAR',8,`Komplette Auûenrotation Schulter ${side}`);
}

function arrUp(id,x,lineY,label){
  sm[id]='neutral';
  const yB=lineY+ARROW_OVERLAP,yT=lineY-ARROW_OVERLAP-TIP,yTB=yT+TIP;
  const l=mkl(x,yB,x,yTB);
  const p=el('polygon',{points:`${x},${yT} ${x-TIP/2},${yTB} ${x+TIP/2},${yTB}`,fill:COL});
  const h=hit(x-8,yT,16,yB-yT);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;l.setAttribute('stroke',SCOL[next]);p.setAttribute('fill',FCOL[next]);showSb(label||id,next);};
  reg2(id,fn,label||id);h.addEventListener('click',fn);
  return {l,p};
}

function arrDown(id,x,lineY,label){
  sm[id]='neutral';
  const yT=lineY-ARROW_OVERLAP,yTip=lineY+ARROW_OVERLAP+TIP,yTB=yTip-TIP;
  const l=mkl(x,yT,x,yTB);
  const p=el('polygon',{points:`${x},${yTip} ${x-TIP/2},${yTB} ${x+TIP/2},${yTB}`,fill:COL});
  const h=hit(x-8,yT,16,yTip-yT);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;l.setAttribute('stroke',SCOL[next]);p.setAttribute('fill',FCOL[next]);showSb(label||id,next);};
  reg2(id,fn,label||id);h.addEventListener('click',fn);
  return {l,p};
}

// Querlinie mit Richtungspfeilen + optional Plus als Gruppe
function hlineDir(idL,idR,y,labelL,labelR,plusIdL,plusIdR,plusLabelL,plusLabelR){
  const linie=mkl(LX,y,RX,y);
  const s=8;
  const ptsL=`${LX-s},${y} ${LX},${y-s*.6} ${LX},${y+s*.6}`;
  const ptsR=`${RX+s},${y} ${RX},${y-s*.6} ${RX},${y+s*.6}`;
  const triL=el('polygon',{points:ptsL,fill:'none',stroke:COL,'stroke-width':1.5});
  const triR=el('polygon',{points:ptsR,fill:'none',stroke:COL,'stroke-width':1.5});
  sm[idL]='neutral';sm[idR]='neutral';
  const hL=hit(LX-s-4,y-s-4,s*2+8,s*2+8);hL.style.cursor='pointer';
  const hR=hit(RX-s-4,y-s-4,s*2+8,s*2+8);hR.style.cursor='pointer';

  const cycL=(withPlus)=>{
    const next=cs(idL);sm[idL]=next;sm[idR]='neutral';
    triR.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);
    if(withPlus&&plusIdL&&reg[plusIdL]){sm[plusIdL]=next;const pt=svg.querySelector(`[data-plus="${plusIdL}"]`);if(pt)pt.setAttribute('fill',FCOL[next]);}
    showSb(withPlus?(plusLabelL||labelL):labelL,next);
  };
  const cycR=(withPlus)=>{
    const next=cs(idR);sm[idR]=next;sm[idL]='neutral';
    triL.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);
    if(withPlus&&plusIdR&&reg[plusIdR]){sm[plusIdR]=next;const pt=svg.querySelector(`[data-plus="${plusIdR}"]`);if(pt)pt.setAttribute('fill',FCOL[next]);}
    showSb(withPlus?(plusLabelR||labelR):labelR,next);
  };

  reg2(idL,()=>cycL(false),labelL);reg2(idR,()=>cycR(false),labelR);
  if(plusIdL) reg2(plusIdL+'_komp',()=>cycL(true),plusLabelL||labelL);
  if(plusIdR) reg2(plusIdR+'_komp',()=>cycR(true),plusLabelR||labelR);
  hL.addEventListener('click',()=>cycL(false));
  hR.addEventListener('click',()=>cycR(false));
}

function plusMark(id,x,y,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL});
  t.style.cursor='pointer';t.textContent='+';t.setAttribute('data-plus',id);svg.appendChild(t);
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',FCOL[next]);showSb(label||id,next);};
  reg2(id,fn,label||id);t.addEventListener('click',fn);return t;
}

function cross2(idA,idB,my,labelA,labelB){
  const lA1=mkl(CX,my,CX-dx,my+dy),lA2=mkl(CX,my,CX+dx,my-dy);
  const lB1=mkl(CX,my,CX-dx,my-dy),lB2=mkl(CX,my,CX+dx,my+dy);
  sm[idA]='neutral';sm[idB]='neutral';
  const hA1=el('line',{x1:CX,y1:my,x2:CX-dx,y2:my+dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hA2=el('line',{x1:CX,y1:my,x2:CX+dx,y2:my-dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hB1=el('line',{x1:CX,y1:my,x2:CX-dx,y2:my-dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hB2=el('line',{x1:CX,y1:my,x2:CX+dx,y2:my+dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const fnA=()=>{const next=cs(idA);sm[idA]=next;[lA1,lA2].forEach(l=>l.setAttribute('stroke',SCOL[next]));showSb(labelA,next);};
  const fnB=()=>{const next=cs(idB);sm[idB]=next;[lB1,lB2].forEach(l=>l.setAttribute('stroke',SCOL[next]));showSb(labelB,next);};
  reg2(idA,fnA,labelA);reg2(idB,fnB,labelB);
  [hA1,hA2].forEach(h=>{h.style.cursor='pointer';h.addEventListener('click',fnA);});
  [hB1,hB2].forEach(h=>{h.style.cursor='pointer';h.addEventListener('click',fnB);});
}

function splitEllipse(idL,idR,yTop,yBot,labelL,labelR){
  const cy=(yTop+yBot)/2,ry=(yBot-yTop)/2,rx=12;
  const pL=el('path',{d:`M ${CX} ${cy-ry} A ${rx} ${ry} 0 0 0 ${CX} ${cy+ry}`,fill:'none',stroke:COL_DASH,'stroke-width':1.5,'stroke-dasharray':'4,3'});
  const pR=el('path',{d:`M ${CX} ${cy-ry} A ${rx} ${ry} 0 0 1 ${CX} ${cy+ry}`,fill:'none',stroke:COL_DASH,'stroke-width':1.5,'stroke-dasharray':'4,3'});
  const hL=hit(CX-rx-4,cy-ry-4,rx+4,ry*2+8),hR=hit(CX,cy-ry-4,rx+4,ry*2+8);
  hL.style.cursor='pointer';hR.style.cursor='pointer';sm[idL]='neutral';sm[idR]='neutral';
  const fnL=()=>{const next=cs(idL);sm[idL]=next;pL.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(labelL,next);};
  const fnR=()=>{const next=cs(idR);sm[idR]=next;pR.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(labelR,next);};
  reg2(idL,fnL,labelL);reg2(idR,fnR,labelR);
  hL.addEventListener('click',fnL);hR.addEventListener('click',fnR);
}

function tri(id,x,y,dir,label){
  const s=20;
  const pts=dir==='left'?`${x-s},${y} ${x},${y-s*.6} ${x},${y+s*.6}`:`${x+s},${y} ${x},${y-s*.6} ${x},${y+s*.6}`;
  const p=el('polygon',{points:pts,fill:'none',stroke:COL,'stroke-width':SW});
  sm[id]='neutral';p.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;p.setAttribute('stroke',SCOL[next]);showSb(label,next);};
  reg2(id,fn,label);p.addEventListener('click',fn);
}

function makeSign(id,x,y,sign,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':26,fill:COL});
  t.style.cursor='pointer';t.textContent=sign;svg.appendChild(t);sm[id]='neutral';
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',FCOL[next]);showSb(label,next);};
  reg2(id,fn,label);t.addEventListener('click',fn);
}

function bracket(id,cx,yTop,yBot,dir,label){
  const ry=(yBot-yTop)/2,cy=(yTop+yBot)/2,rx=14;
  const d=dir==='left'?`M ${cx} ${cy-ry} A ${rx} ${ry} 0 0 0 ${cx} ${cy+ry}`:`M ${cx} ${cy-ry} A ${rx} ${ry} 0 0 1 ${cx} ${cy+ry}`;
  const p=el('path',{d,fill:'none',stroke:COL_DASH,'stroke-width':SW,'stroke-dasharray':'4,3'});
  const h=hit(cx-rx-4,cy-ry-4,rx*2+8,ry*2+8);h.style.cursor='pointer';sm[id]='neutral';
  const fn=()=>{const next=cs(id);sm[id]=next;p.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(label,next);};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function dashLine(id,cx,cy,dir,label){
  sm[id]='neutral';const half=HWS_D/2;
  const l=dir==='/'
    ?el('line',{x1:cx-half,y1:cy+half,x2:cx+half,y2:cy-half,stroke:COL_DASH,'stroke-width':SW,'stroke-linecap':'round','stroke-dasharray':'4,3'})
    :el('line',{x1:cx-half,y1:cy-half,x2:cx+half,y2:cy+half,stroke:COL_DASH,'stroke-width':SW,'stroke-linecap':'round','stroke-dasharray':'4,3'});
  const h=hit(cx-half-6,cy-half-6,HWS_D+12,HWS_D+12);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;console.log('beckenshift fn aufgerufen, next=',next,'l=',l);l.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(label,next);};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function hwsRot(id,cx,cy,arcDir,triDir,label){
  sm[id]='neutral';const R=12,ts=6;const sweep=arcDir==='right'?1:0;
  const arc=el('path',{d:`M ${cx} ${cy-R} A ${R} ${R} 0 0 ${sweep} ${cx} ${cy+R}`,fill:'none',stroke:COL_DASH,'stroke-width':SW,'stroke-dasharray':'4,3'});
  const triPts=triDir==='right'?`${cx+ts},${cy} ${cx-ts/2},${cy-ts} ${cx-ts/2},${cy+ts}`:`${cx-ts},${cy} ${cx+ts/2},${cy-ts} ${cx+ts/2},${cy+ts}`;
  const triEl=el('polygon',{points:triPts,fill:COL_DASH,stroke:'none'});
  const h=hit(cx-R-6,cy-R-6,R*2+12,R*2+12);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;const col=next==='neutral'?COL_DASH:SCOL[next];arc.setAttribute('stroke',col);triEl.setAttribute('fill',col);showSb(label,next);};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function slashL(id,yCenter,label){
  const dX=14,dY=14;const l=mkl(2,yCenter-dY/2,2+dX,yCenter+dY/2);
  const h=hit(0,yCenter-dY/2-4,dX+4,dY+8);h.style.cursor='pointer';sm[id]='neutral';
  const fn=()=>{const next=cs(id);sm[id]=next;l.setAttribute('stroke',SCOL[next]);showSb(label||id,next);};
  reg2(id,fn,label||id);[l,h].forEach(e=>e.addEventListener('click',fn));
  return l;
}
function slashR(id,yCenter,label){
  const dX=14,dY=14;const l=mkl(284,yCenter+dY/2,284+dX,yCenter-dY/2);
  const h=hit(282,yCenter-dY/2-4,dX+4,dY+8);h.style.cursor='pointer';sm[id]='neutral';

// Laterale Kraftlinie ã alle 3 Linien zusammen
function lateralKraftlinie(side){
  const ys=[(Y2+Y3)/2,(Y1+Y2)/2,Y1-14];
  const lines=[];
  if(side==='L') ys.forEach((y,i)=>{lines.push(slashL(`slash-L-${i}`,y));});
  else ys.forEach((y,i)=>{lines.push(slashR(`slash-R-${i}`,y));});

  const id=`lateral-${side}`;
  sm[id]='neutral';
  const fn=()=>{
    const next=cs(id);sm[id]=next;
    lines.forEach(l=>l.setAttribute('stroke',SCOL[next]));
    ys.forEach((_,i)=>{sm[`slash-${side}-${i}`]=next;});
    showSb(`Laterale Kraftlinie ${side}`,next);
  };
  reg2(id,fn,`Laterale Kraftlinie ${side}`);
}

// Vordere/Hintere Kraftlinien (Pfeile û¥ber beide Querlinien)
function kraftlinie(id,side,dir,label){
  // side: L/R, dir: up=vordere, down=hintere
  const x=side==='L'?(dir==='up'?P_L2:P_L1):(dir==='up'?P_R1:P_R2);
  const {l:l2,p:p2}=dir==='up'?arrUp(`${id}_2`,x,Y2,label):arrDown(`${id}_2`,x,Y2,label);
  const {l:l3,p:p3}=dir==='up'?arrUp(`${id}_3`,x,Y3,label):arrDown(`${id}_3`,x,Y3,label);
  sm[`${id}_2`]='neutral';sm[`${id}_3`]='neutral';

  const fn=()=>{
    const next=cs(id);sm[id]=next;
    sm[`${id}_2`]=next;sm[`${id}_3`]=next;
    [l2,l3].forEach(l=>l.setAttribute('stroke',SCOL[next]));
    [p2,p3].forEach(p=>p.setAttribute('fill',FCOL[next]));
    showSb(label,next);
  };
  reg2(id,fn,label);
}

// Beckenshift ã senkrechte gestrichelte Linie, LûÊnge = dy (ûffnung des Kreuzes)
function beckenshift(id,cx,cy,label){
  sm[id]='neutral';
  const l=el('line',{x1:cx,y1:cy-dy/2,x2:cx,y2:cy+dy/2,
    stroke:COL_DASH,'stroke-width':SW,'stroke-linecap':'round','stroke-dasharray':'4,3'});
  const h=hit(cx-8,cy-dy/2-4,16,dy+8);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;console.log('beckenshift fn aufgerufen, next=',next,'l=',l);l.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(label,next);};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

const tabMap=[
  ['ich beginne im stand','Stand'],['stand','Stand'],
  ['ich beginne im sitz','Sitz'],['sitz','Sitz'],

// Globale cycle-Funktion als Fallback fû¥r alle Symbole
function symbolCycle(id){
  // Alle SVG-Elemente nach data-id durchsuchen
  const el=svg.querySelector('[data-symid="'+id+'"]');
  if(el){el.dispatchEvent(new MouseEvent('click'));return true;}
  return false;
}

function handleSpeech(transcript){
  const t=transcript.toLowerCase().trim();
  document.getElementById('speechLog').textContent='GehûÑrt: ã'+transcript+'"';

  // Tab-Wechsel ã nur exakter Match oder klare Anfangsphrase
  for(const [phrase,tab] of tabMap){
    if(t===phrase||t.startsWith('ich beginne im ')||t.startsWith('ich beginne in ')){
      if(t.includes(phrase)){
        document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.textContent===tab));
        document.getElementById('sb').textContent='Tab: '+tab;
        return;
      }
    }
  }

  // FFA mit Wert z.B. 'FFA 30'
  const ffaMatch=t.match(/(?:ffa|finger.{0,20}abstand)\s+(\d+)/);
  if(ffaMatch){
    const wert=ffaMatch[1];
    sm['FFA']='restricted';
    const ffaLabel=svg.querySelector('[data-ffa="label"]');
    const ffaWertEl=svg.querySelector('[data-ffa="wert"]');
    if(ffaLabel) ffaLabel.setAttribute('fill','#cc0000');
    if(ffaWertEl){ffaWertEl.textContent=wert+' cm';ffaWertEl.setAttribute('fill','#cc0000');}
    showSb('FFA: '+wert+' cm','restricted');
    return;
  }

  // Sprachbegriffe ã lûÊngere zuerst (sortiert)
  const sortedMap=[...speechMap].sort((a,b)=>b[0].length-a[0].length);
  for(const [phrase,id] of sortedMap){
    if(t.includes(phrase)) console.log('Match:', phrase, '->', id, '| reg:', !!reg[id]);
    if(t.includes(phrase)){
      // Direkt cycle aufrufen wenn in reg vorhanden
      if(reg[id]){reg[id].cycle();return;}
      // Debug: ID nicht in reg gefunden
      console.warn('ID nicht in reg:', id, '| Verfû¥gbare IDs:', Object.keys(reg).join(', '));
    }
  }

  document.getElementById('speechLog').textContent='Nicht erkannt: ã'+transcript+'" ã bitte Symbol antippen';
}

// ããã SPRACHERKENNUNG ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
let micRunning=false;

function setMicUI(state,text){
  document.getElementById('micDot').classList.toggle('active',state==='active');
  document.getElementById('micStatus').classList.toggle('listening',state==='active');
  document.getElementById('micText').textContent=text;
  document.getElementById('micStartBtn').style.display=state==='stopped'?'inline-block':'none';
}

function startRecognition(){
  if(micRunning)return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    setMicUI('stopped','Spracherkennung nicht verfû¥gbar');return;
  }
  micRunning=true;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onstart=()=>setMicUI('active','Mikrofon aktiv ã hûÑrt zuãÎ');
  recognition.onresult=(e)=>handleSpeech(e.results[e.results.length-1][0].transcript);
  recognition.onerror=(e)=>{
    micRunning=false;
    if(e.error==='not-allowed'){setMicUI('stopped','Mikrofon-Zugriff verweigert');return;}
    if(e.error==='network'){setMicUI('stopped','Netzwerkfehler ã bitte Mikrofon-Button drû¥cken');return;}
    setMicUI('stopped','Kurze PauseãÎ ('+e.error+')');
    setTimeout(startRecognition,5000);
  };
  recognition.onend=()=>{micRunning=false;setTimeout(startRecognition,3000);setMicUI('stopped','Mikrofon kurz unterbrochenãÎ');};
  try{recognition.start();}catch(e){micRunning=false;setMicUI('stopped','Fehler ã bitte Button drû¥cken');}
}
window.addEventListener('load',()=>setTimeout(startRecognition,1500));

// ããã RESET ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function resetAll(){
  Object.keys(sm).forEach(k=>sm[k]='neutral');
  svg.querySelectorAll('line').forEach(l=>{if(l.getAttribute('stroke')==='transparent')return;if(l.getAttribute('stroke-dasharray'))l.setAttribute('stroke',COL_DASH);else l.setAttribute('stroke',COL);});
  svg.querySelectorAll('path').forEach(p=>{if(p.getAttribute('stroke-dasharray'))p.setAttribute('stroke',COL_DASH);else p.setAttribute('stroke',COL);});
  svg.querySelectorAll('polygon').forEach(p=>{if(p.getAttribute('fill')==='none')p.setAttribute('stroke',COL);else if(p.getAttribute('fill')==='transparent')return;else p.setAttribute('fill',COL);});
  svg.querySelectorAll('circle').forEach(c=>{c.setAttribute('fill',COL_BG);c.setAttribute('stroke',COL);});
  svg.querySelectorAll('text').forEach(t=>{if(t.getAttribute('pointer-events')==='none')return;t.setAttribute('fill',COL);});
  document.getElementById('sb').textContent='Alle zurû¥ckgesetzt';
}

// ããã EXPORT ããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
function exportBefund(){
  const aktiv=Object.entries(sm).filter(([k,v])=>v!=='neutral').map(([k,v])=>{
    const r=reg[k];return r?`${r.label}: ${LABELS[v]}`:null;
  }).filter(Boolean);
  const text=aktiv.length>0?'Befund Stand:\n'+aktiv.join('\n'):'Keine Befunde dokumentiert';
  try{
    const svgEl=document.getElementById('sv');
    const svgData=new XMLSerializer().serializeToString(svgEl);
    const canvas=document.createElement('canvas');canvas.width=400;canvas.height=750;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,400,750);
    const img=new Image();
    const blob=new Blob([svgData],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{
      ctx.drawImage(img,40,20,320,710);
      const a=document.createElement('a');
      a.download='Befund_Stand_'+new Date().toISOString().slice(0,10)+'.png';
      a.href=canvas.toDataURL('image/png');a.click();URL.revokeObjectURL(url);
    };
    img.src=url;
  }catch(e){
    const blob=new Blob([text],{type:'text/plain'});
    const a=document.createElement('a');
    a.download='Befund_Stand_'+new Date().toISOString().slice(0,10)+'.txt';
    a.href=URL.createObjectURL(blob);a.click();
  }
}
