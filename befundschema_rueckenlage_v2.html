<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Befundschema – Rückenlage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; color: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 6px; }
h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 5px; }
.tabs { display: flex; gap: 4px; margin-bottom: 5px; flex-wrap: wrap; justify-content: center; }
.tab { font-size: 10px; padding: 4px 10px; border: 1px solid #bbb; border-radius: 4px; background: #fff; color: #666; cursor: pointer; letter-spacing: 1px; }
.tab.active { background: #222; color: #fff; border-color: #222; }
.legend { display: flex; gap: 10px; align-items: center; font-size: 10px; color: #666; margin-bottom: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }
#schema-container { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 4px; margin-bottom: 5px; }
.status-bar { width: 100%; max-width: 500px; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 5px 10px; font-size: 11px; color: #666; min-height: 26px; margin-bottom: 4px; }
.mic-status { width: 100%; max-width: 500px; background: #fff; border: 2px solid #ccc; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #666; min-height: 24px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.mic-status.listening { border-color: #cc0000; background: #fff5f5; }
.mic-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.mic-dot.active { background: #cc0000; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.speech-log { width: 100%; max-width: 500px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 3px 8px; font-size: 10px; color: #888; min-height: 20px; font-style: italic; margin-bottom: 3px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; font-size: 11px; cursor: pointer; letter-spacing: 1px; background: #fff; color: #333; }
#audioBtn { background: #fff0e0; color: #996600; border-color: #cc8800; }
#exportBtn { background: #f0fff0; color: #336600; border-color: #336600; }
#resetBtn { background: #fff8f0; color: #996600; border-color: #cc8800; }
.hint { font-size: 9px; color: #aaa; text-align: center; margin-bottom: 4px; }
</style>
</head>
<body>
<h1>Befundschema</h1>
<div class="tabs">
  <button class="tab" onclick="switchTab('Stand')">Stand</button>
  <button class="tab" onclick="switchTab('Sitz')">Sitz</button>
  <button class="tab" onclick="switchTab('Rippe')">Rippe</button>
  <button class="tab active" onclick="switchTab('Rück')">Rück</button>
  <button class="tab" onclick="switchTab('Zusatz')">Zusatz</button>
  <button class="tab" onclick="switchTab('Schädel')">Schädel</button>
</div>
<div class="legend">
  <span><span class="dot" style="background:#cc0000"></span>eingeschränkt</span>
  <span><span class="dot" style="background:#00aa33"></span>physiologisch</span>
</div>
<div id="schema-container">
  <svg id="sv" viewBox="-60 -120 430 700" style="display:block;width:100%;max-width:500px;background:#fff;"></svg>
</div>
<div class="status-bar" id="sb">Symbol antippen oder sprechen</div>
<div class="mic-status" id="micStatus">
  <span class="mic-dot" id="micDot"></span>
  <span id="micText">Mikrofon wird gestartet…</span>
</div>
<div class="speech-log" id="speechLog">Warte auf Spracheingabe…</div>
<p class="hint">1× = eingeschränkt/frei · Korrektur [Symbol] = zurücksetzen</p>
<div class="controls">
  <button id="audioBtn" onclick="aktiviereAudio()">🔔 Ton aktivieren</button>
  <button id="exportBtn" onclick="exportBefund()">📸 Exportieren</button>
  <button id="resetBtn" onclick="resetAll()">↺ Zurücksetzen</button>
</div>

<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent===name));
  document.getElementById('sb').textContent='Tab: '+name;
}

const svg=document.getElementById('sv');
const NS="http://www.w3.org/2000/svg";
const SW=2,COL='#222',COL_DASH='#aaa',COL_BG='#fff';
const CX=150,LX=50,RX=250;
const GAP=40,LGAP=80;
const CY_TOP=55;
const Y1=CY_TOP+GAP;    // Schultergürtel
const Y2=Y1+LGAP;       // Thorax
const Y3=Y2+LGAP;       // Becken
const SAC_T=50,COC_H=20;
const SAC_Y_BASE=Y3+LGAP/2;
const Y4=SAC_Y_BASE+SAC_T+6+COC_H; // Beckenboden = Coccyx-Spitze
const CR=14;
const SCOL={neutral:COL,restricted:'#cc0000',free:'#00aa33'};
const FCOL={neutral:COL,restricted:'#cc0000',free:'#00aa33'};
const sm={};
const reg={};

function el(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e;}
function cs(id){return sm[id]==='neutral'?'restricted':'neutral';}
function csPhysio(id){return sm[id]==='neutral'?'free':'neutral';}
function reg2(id,fn,label){sm[id]='neutral';reg[id]={cycle:fn,label};}
function mkl(x1,y1,x2,y2,extra={}){return el('line',{x1,y1,x2,y2,stroke:COL,'stroke-width':SW,'stroke-linecap':'round',...extra});}
function hit(x,y,w,h){const r=el('rect',{x,y,width:w,height:h,fill:'transparent'});r.style.cursor='pointer';return r;}
function stxt(x,y,s,sz=8,col='#666'){const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':sz,fill:col,'pointer-events':'none'});t.textContent=s;return t;}
function showSb(label,state){
  const sb=document.getElementById('sb');
  const LABELS={neutral:'zurückgesetzt',restricted:'eingeschränkt',free:'physiologisch'};
  sb.innerHTML=`<span style="font-weight:600">${label}</span> → <span style="color:${SCOL[state]}">${LABELS[state]}</span>`;
}

// Audio
let audioCtx=null;
function playTon(freq,dauer,typ='sine'){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type=typ;osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dauer);
    osc.start();osc.stop(audioCtx.currentTime+dauer);
  }catch(e){}
}
function tonErfolgreich(){playTon(523,0.12);setTimeout(()=>playTon(784,0.12),130);setTimeout(()=>playTon(1047,0.15),260);}
function aktiviereAudio(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume().then(()=>{
      const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
      osc.start();osc.stop(audioCtx.currentTime+0.3);
      document.getElementById('audioBtn').textContent='🔔 Ton aktiv';
      document.getElementById('audioBtn').style.background='#f0fff0';
      document.getElementById('audioBtn').style.color='#336600';
    });
  }catch(e){}
}

// Hilfsfunktionen
function hlineDir(idL,idR,y,labelL,labelR,physioSide){
  const linie=mkl(LX,y,RX,y);
  const s=8;
  const ptsL=`${LX-s},${y} ${LX},${y-s*.6} ${LX},${y+s*.6}`;
  const ptsR=`${RX+s},${y} ${RX},${y-s*.6} ${RX},${y+s*.6}`;
  const triL=el('polygon',{points:ptsL,fill:'none',stroke:COL,'stroke-width':1.5});
  const triR=el('polygon',{points:ptsR,fill:'none',stroke:COL,'stroke-width':1.5});
  const hL=hit(LX-s-4,y-s-4,s*2+8,s*2+8);hL.style.cursor='pointer';
  const hR=hit(RX-s-4,y-s-4,s*2+8,s*2+8);hR.style.cursor='pointer';
  const cycL=()=>{
    const next=physioSide==='L'?csPhysio(idL):cs(idL);sm[idL]=next;sm[idR]='neutral';
    triR.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);
    showSb(labelL,next);tonErfolgreich();
  };
  const cycR=()=>{
    const next=physioSide==='R'?csPhysio(idR):cs(idR);sm[idR]=next;sm[idL]='neutral';
    triL.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);
    showSb(labelR,next);tonErfolgreich();
  };
  reg2(idL,cycL,labelL);reg2(idR,cycR,labelR);
  hL.addEventListener('click',cycL);hR.addEventListener('click',cycR);
}

function plusMark(id,x,y,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL});
  t.style.cursor='pointer';t.textContent='+';svg.appendChild(t);
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);t.addEventListener('click',fn);return t;
}

function makeWendepunkt(id,idL,idR,label){
  sm[id]='neutral';
  const fn=()=>{
    const next=cs(id);sm[id]=next;
    // Färbe beide Seiten
    if(reg[idL]) reg[idL].cycle();
    if(reg[idR]) reg[idR].cycle();
    showSb(label,next);tonErfolgreich();
  };
  reg2(id,fn,label);
}

function makeBracketArrow(id,cx,cy,dir,label){
  sm[id]='neutral';
  const TS=5,PL2=8;
  const tL=el('text',{x:cx-PL2-2,y:cy,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL,'pointer-events':'none'});tL.textContent='(';svg.appendChild(tL);
  const tR=el('text',{x:cx+PL2+2,y:cy,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL,'pointer-events':'none'});tR.textContent=')';svg.appendChild(tR);
  let shaft,tip;
  if(dir==='left'){shaft=mkl(cx+PL2-2,cy,cx-PL2+TS,cy);tip=el('polygon',{points:`${cx-PL2},${cy} ${cx-PL2+TS},${cy-TS/2} ${cx-PL2+TS},${cy+TS/2}`,fill:COL});}
  else{shaft=mkl(cx-PL2+2,cy,cx+PL2-TS,cy);tip=el('polygon',{points:`${cx+PL2},${cy} ${cx+PL2-TS},${cy-TS/2} ${cx+PL2-TS},${cy+TS/2}`,fill:COL});}
  const h=el('rect',{x:cx-PL2-6,y:cy-8,width:PL2*2+12,height:16,fill:'transparent'});h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;const col=next==='neutral'?COL:SCOL[next];[tL,tR].forEach(t=>t.setAttribute('fill',col));shaft.setAttribute('stroke',col);tip.setAttribute('fill',col);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

// ─── SVG AUFBAU ──────────────────────────────────────────────────────────────

stxt(20,12,'L',9);stxt(280,12,'R',9);

// Mittellinie — endet an Sacrum Oberkante
mkl(CX,CY_TOP,CX,Y3);

// Querlinien RL — CTÜ Shift, Thoraxshift, Beckenshift
// Shift nach rechts = rechte Seite (Dreieck+Plus+Linie), nach links = linke Seite
function hlineShift(idL,idR,y,labelL,labelR){
  const linie=mkl(LX,y,RX,y);
  const s=8;
  const ptsL=`${LX-s},${y} ${LX},${y-s*.6} ${LX},${y+s*.6}`;
  const ptsR=`${RX+s},${y} ${RX},${y-s*.6} ${RX},${y+s*.6}`;
  const triL=el('polygon',{points:ptsL,fill:'none',stroke:COL,'stroke-width':1.5});
  const triR=el('polygon',{points:ptsR,fill:'none',stroke:COL,'stroke-width':1.5});
  const hL=hit(LX-s-4,y-s-4,s*2+8,s*2+8);hL.style.cursor='pointer';
  const hR=hit(RX-s-4,y-s-4,s*2+8,s*2+8);hR.style.cursor='pointer';
  const cycL=()=>{const next=cs(idL);sm[idL]=next;sm[idR]='neutral';
    triR.setAttribute('stroke',COL);
    [linie,triL].forEach(e=>e.setAttribute('stroke',SCOL[next]));
    if(plusEls[idL]) plusEls[idL].setAttribute('fill',next==='neutral'?COL:SCOL[next]);
    if(plusEls[idR]) plusEls[idR].setAttribute('fill',COL);
    showSb(labelL,next);tonErfolgreich();};
  const cycR=()=>{const next=cs(idR);sm[idR]=next;sm[idL]='neutral';
    triL.setAttribute('stroke',COL);
    [linie,triR].forEach(e=>e.setAttribute('stroke',SCOL[next]));
    if(plusEls[idR]) plusEls[idR].setAttribute('fill',next==='neutral'?COL:SCOL[next]);
    if(plusEls[idL]) plusEls[idL].setAttribute('fill',COL);
    showSb(labelR,next);tonErfolgreich();};
  reg2(idL,cycL,labelL);reg2(idR,cycR,labelR);
  hL.addEventListener('click',cycL);hR.addEventListener('click',cycR);
}
const plusEls={};
function plusMarkShift(id,x,y,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL});
  t.style.cursor='pointer';t.textContent='+';svg.appendChild(t);
  plusEls[id]=t;
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);t.addEventListener('click',fn);return t;
}

hlineShift('CTÜ-L','CTÜ-R',Y1,'CTÜ Shift links','CTÜ Shift rechts');


hlineShift('ThS-L','ThS-R',Y2,'Thoraxshift links','Thoraxshift rechts');


hlineShift('BeS-L','BeS-R',Y3,'Beckenshift links','Beckenshift rechts');


// Wendepunkte
makeWendepunkt('wCTÜ','CTÜ-L','CTÜ-R','Wendepunkt CTÜ');
makeWendepunkt('wThS','ThS-L','ThS-R','Wendepunkt Thoraxshift');
makeWendepunkt('wBeS','BeS-L','BeS-R','Wendepunkt Beckenshift');



// Sacrum (Trapez)
{const sacX=CX,sacY=Y3;
 const sacW=50,sacB=14;
 const pts=`${sacX-sacB/2},${sacY+SAC_T} ${sacX+sacB/2},${sacY+SAC_T} ${sacX+sacW/2},${sacY} ${sacX-sacW/2},${sacY}`;
 el('polygon',{points:pts,fill:'none',stroke:COL,'stroke-width':SW});


 // S — Kurvatur Sacrum (links und rechts außen, unter Y3)
 makePaar('S-L','S-R',sacX,sacY+12,'S',
   'Kurvatur Sacrum links eingeschränkt',
   'Kurvatur Sacrum rechts eingeschränkt',
   'Kurvatur Sacrum beidseits eingeschränkt', 12);

 // C — Kurvatur Coccyx, an Unterkante Sacrum
 makePaar('CV-L','CV-R',sacX,sacY+SAC_T-6,'C',
   'Kurvatur Coccyx links eingeschränkt',
   'Kurvatur Coccyx rechts eingeschränkt',
   'Kurvatur Coccyx beidseits eingeschränkt', 4);

 // Coccyx Dreieck
 const cocY=sacY+SAC_T+6;
 const cocPts=`${sacX},${cocY+COC_H} ${sacX-sacB/2},${cocY} ${sacX+sacB/2},${cocY}`;
 el('polygon',{points:cocPts,fill:'none',stroke:COL,'stroke-width':SW});


}




// ─── Kurvatursymbole nahe Mittellinie ────────────────────────────────────────
function makePaar(idL,idR,x,y,buchstabe,labelL,labelR,labelB,offset=12){
  // Links
  const tL=el('text',{x:''+(CX-offset),y:''+y,'text-anchor':'middle','dominant-baseline':'middle','font-size':8,fill:COL});
  tL.setAttribute('font-size',10);tL.textContent=buchstabe;tL.style.cursor='pointer';svg.appendChild(tL);
  sm[idL]='neutral';
  const fnL=()=>{const next=cs(idL);sm[idL]=next;tL.setAttribute('fill',SCOL[next]);showSb(labelL,next);tonErfolgreich();};
  reg2(idL,fnL,labelL);tL.addEventListener('click',fnL);

  // Rechts
  const tR=el('text',{x:''+(CX+offset),y:''+y,'text-anchor':'middle','dominant-baseline':'middle','font-size':8,fill:COL});
  tR.setAttribute('font-size',10);tR.textContent=buchstabe;tR.style.cursor='pointer';svg.appendChild(tR);
  sm[idR]='neutral';
  const fnR=()=>{const next=cs(idR);sm[idR]=next;tR.setAttribute('fill',SCOL[next]);showSb(labelR,next);tonErfolgreich();};
  reg2(idR,fnR,labelR);tR.addEventListener('click',fnR);

  // Beidseits
  const idB=idL.replace('-L','-B');
  sm[idB]='neutral';
  const fnB=()=>{
    const next=cs(idB);sm[idB]=next;
    sm[idL]=next;sm[idR]=next;
    tL.setAttribute('fill',SCOL[next]);tR.setAttribute('fill',SCOL[next]);
    showSb(labelB,next);tonErfolgreich();
  };
  reg2(idB,fnB,labelB);
}

// E — Kurvatur HWS cranial (oberhalb C4)
makePaar('E-L','E-R',CX,CY_TOP,'E',
  'Kurvatur HWS cranial links eingeschränkt',
  'Kurvatur HWS cranial rechts eingeschränkt',
  'Kurvatur HWS cranial beidseits eingeschränkt');

// C4 — Wirbel C4
makePaar('C4-L','C4-R',CX,CY_TOP+14,'C4',
  'C4 links eingeschränkt','C4 rechts eingeschränkt','C4 beidseits eingeschränkt',20);

// D — Kurvatur HWS caudal (unterhalb C4)
makePaar('D-L','D-R',CX,Y1-8,'D',
  'Kurvatur HWS caudal links eingeschränkt',
  'Kurvatur HWS caudal rechts eingeschränkt',
  'Kurvatur HWS caudal beidseits eingeschränkt');

// C — obere BWS Kurvatur (unter Y1)
makePaar('C-L','C-R',CX,Y1+8,'C',
  'Kurvatur BWS oben links eingeschränkt',
  'Kurvatur BWS oben rechts eingeschränkt',
  'Kurvatur BWS oben beidseits eingeschränkt');

// B — untere BWS Kurvatur (über Y2)
makePaar('B-L','B-R',CX,Y2-8,'B',
  'Kurvatur BWS unten links eingeschränkt',
  'Kurvatur BWS unten rechts eingeschränkt',
  'Kurvatur BWS unten beidseits eingeschränkt');

// A — obere LWS Kurvatur (unter Y2)
makePaar('A-L','A-R',CX,Y2+8,'A',
  'Kurvatur LWS oben links eingeschränkt',
  'Kurvatur LWS oben rechts eingeschränkt',
  'Kurvatur LWS oben beidseits eingeschränkt');

// O — untere LWS Kurvatur (über Y3)
makePaar('O-L','O-R',CX,Y3-8,'O',
  'Kurvatur LWS unten links eingeschränkt',
  'Kurvatur LWS unten rechts eingeschränkt',
  'Kurvatur LWS unten beidseits eingeschränkt');

// Durales Muster — segmentierte Linie links und rechts, weiter lateral
{const DX=32;
 const GAP2=4; // Lücke an Querlinien
 // Segmente: zwischen den Buchstaben-Bereichen
 const segs=[
   [CY_TOP, Y1-GAP2],            // E-Bereich bis CTÜ
   [Y1+GAP2, Y2-GAP2],           // C-B Bereich
   [Y2+GAP2, Y3-GAP2],           // A-O Bereich
   [Y3+GAP2, Y3+SAC_T],          // bis Unterkante Sacrum = Höhe C
 ];
 ['L','R'].forEach(side=>{
   const x=side==='L'?CX-DX:CX+DX;
   const lines=segs.map(([y1,y2])=>
     el('line',{x1:x,y1,x2:x,y2,stroke:'#999','stroke-width':3.5,'stroke-linecap':'round'})
   );
   const h=hit(x-8,CY_TOP,16,SAC_Y_BASE+SAC_T-CY_TOP);h.style.cursor='pointer';
   sm['Dural-'+side]='neutral';
   const fn=()=>{const next=cs('Dural-'+side);sm['Dural-'+side]=next;
     lines.forEach(l=>l.setAttribute('stroke',next==='neutral'?'#999':SCOL[next]));
     showSb('Durales Muster '+side,next);tonErfolgreich();};
   reg2('Dural-'+side,fn,'Durales Muster '+side);h.addEventListener('click',fn);
 });
}

// Condylen — weit oberhalb, mit Dreiecks-Pfeilen wie Querlinien
{const CY_COND=CY_TOP-55,CR2=7,s=7,DX=32,gap=5;
 ['L','R'].forEach(side=>{
   const cx=side==='L'?CX-DX:CX+DX,cy=CY_COND;
   const circ=el('circle',{cx,cy,r:CR2,fill:COL_BG,stroke:COL,'stroke-width':SW});

   // Verbindungslinie oben + Dreieck anterior
   mkl(cx,cy-CR2,cx,cy-CR2-gap);
   const ptsA=`${cx},${cy-CR2-gap-s} ${cx-s*.6},${cy-CR2-gap} ${cx+s*.6},${cy-CR2-gap}`;
   const triA=el('polygon',{points:ptsA,fill:'none',stroke:COL,'stroke-width':1.5});
   // Verbindungslinie unten + Dreieck posterior
   mkl(cx,cy+CR2,cx,cy+CR2+gap);
   const ptsP=`${cx},${cy+CR2+gap+s} ${cx-s*.6},${cy+CR2+gap} ${cx+s*.6},${cy+CR2+gap}`;
   const triP=el('polygon',{points:ptsP,fill:'none',stroke:COL,'stroke-width':1.5});

   // Anterior
   const hA=hit(cx-s-4,cy-CR2-s-4,s*2+8,s+8);hA.style.cursor='pointer';
   sm[`Condyle-${side}-A`]='neutral';
   const fnA=()=>{const next=cs(`Condyle-${side}-A`);sm[`Condyle-${side}-A`]=next;
     triA.setAttribute('stroke',SCOL[next]);circ.setAttribute('stroke',SCOL[next]);
     showSb(`Condyle ${side} anterior`,next);tonErfolgreich();};
   reg2(`Condyle-${side}-A`,fnA,`Condyle ${side} anterior`);hA.addEventListener('click',fnA);

   // Posterior

// Schulterkreise RL — F, ABD, AR, IR, AR0
{const SC_L_X=10,SC_R_X=290,SC_Y=Y1,CR=14,S=12,GAP=16;

 function shoulderRL(side){
   const cx=side==='L'?SC_L_X:SC_R_X,cy=SC_Y;

   function updateCircle(){
     const tests=[`RL-F-${side}`,`RL-ABD-${side}`,`RL-AR-${side}`,`RL-IR-${side}`,`RL-AR0-${side}`,`RL-Trakt-${side}`,`RL-SG1-${side}`,`RL-SG2-${side}`,`RL-SG3-${side}`,`RL-HochAdd-${side}`];
     const active=tests.find(id=>sm[id]&&sm[id]!=='neutral');
     circ.setAttribute('stroke',active?SCOL[sm[active]]:COL);
   }

   const circ=el('circle',{cx,cy,r:CR,fill:COL_BG,stroke:COL,'stroke-width':SW});


  // Hohe Adduktion — gerader 45° Pfeil, gleicher Stil wie ABD und Traktion
   {const dirIn3=side==='L'?1:-1;
    // Start: Kreisrand 45° oben-innen
    const r=CR*0.707;
    const startX=cx+dirIn3*r,startY=cy-r;
    // Ende: 14px weiter in 45° Richtung
    const tipX=startX+dirIn3*10,tipY=startY-10;
    const shaft=mkl(startX,startY,tipX,tipY);
    // Pfeilspitze als gleichseitiges Dreieck (wie ABD aber rotiert um 45°)
    // Basis senkrecht zur Achse, 5px vor Spitze
    const baseX=tipX-dirIn3*3.5,baseY=tipY+3.5;
    const tip=el('polygon',{points:`${tipX},${tipY} ${baseX-dirIn3*2.8},${baseY-2.8} ${baseX+dirIn3*2.8},${baseY+2.8}`,fill:COL});
    const h=hit(Math.min(startX,tipX)-6,Math.min(startY,tipY)-6,Math.abs(tipX-startX)+12,Math.abs(tipY-startY)+12);h.style.cursor='pointer';
    sm[`RL-HochAdd-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-HochAdd-${side}`);sm[`RL-HochAdd-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Hohe Adduktion Schulter ${side}`,next);tonErfolgreich();};
    reg2(`RL-HochAdd-${side}`,fn,`Hohe Adduktion Schulter ${side}`);h.addEventListener('click',fn);}

   // SG1, SG2, SG3 lateral außen
   const dirOut2=side==='L'?-1:1;
   const sgX=cx+dirOut2*(CR+18);
   [['SG1',cy-CR-18,'cranial','Hyperabduktion cranial'],
    ['SG2',cy+2,'medial','Hyperabduktion medial / 90°'],
    ['SG3',cy+CR+18,'caudal','Hyperabduktion caudal']
   ].forEach(([label,y,bereich,desc])=>{
     const id=`RL-${label}-${side}`;sm[id]='neutral';
     const t=el('text',{x:''+sgX,y:''+y,'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:COL});
     t.style.cursor='pointer';t.textContent=label;svg.appendChild(t);
     const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',SCOL[next]);showSb(`${desc} ${side}`,next);tonErfolgreich();};
     reg2(id,fn,`${desc} ${side}`);t.addEventListener('click',fn);
   });

   // F oben
   {const t=el('text',{x:''+cx,y:''+(cy-CR-18),'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:COL});
    t.style.cursor='pointer';t.textContent='F';svg.appendChild(t);
    sm[`RL-F-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-F-${side}`);sm[`RL-F-${side}`]=next;t.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Flexion Schulter ${side} RL`,next);tonErfolgreich();};
    reg2(`RL-F-${side}`,fn,`Flexion Schulter ${side} RL`);t.addEventListener('click',fn);}

   // ABD Pfeil — medial vom Kreis, zeigt nach innen (Richtung CX)
   {const dirIn=side==='L'?1:-1;  // L: Pfeil rechts vom Kreis, zeigt nach rechts (zur Mitte)
    const startX=cx+dirIn*CR;
    const tipX=cx+dirIn*(CR+14);
    const shaft=mkl(startX,cy,tipX,cy);
    const tip=side==='L'
      ?el('polygon',{points:`${tipX},${cy} ${tipX-5},${cy-4} ${tipX-5},${cy+4}`,fill:COL})
      :el('polygon',{points:`${tipX},${cy} ${tipX+5},${cy-4} ${tipX+5},${cy+4}`,fill:COL});
    const h=hit(Math.min(startX,tipX)-4,cy-8,Math.abs(startX-tipX)+8,16);h.style.cursor='pointer';
    sm[`RL-ABD-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-ABD-${side}`);sm[`RL-ABD-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Abduktion Schulter ${side} RL`,next);tonErfolgreich();};
    reg2(`RL-ABD-${side}`,fn,`Abduktion Schulter ${side} RL`);h.addEventListener('click',fn);}

   // Traktionspfeil — wie ABD-Pfeil, nach unten unter Kreis
   {const tipY=cy+CR+14;
    const shaft=mkl(cx,cy+CR,cx,tipY);
    const tip=el('polygon',{points:`${cx},${tipY} ${cx-4},${tipY-5} ${cx+4},${tipY-5}`,fill:COL});
    const h=hit(cx-8,cy+CR-4,16,18);h.style.cursor='pointer';
    sm[`RL-Trakt-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-Trakt-${side}`);sm[`RL-Trakt-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Traktion Schulter ${side}`,next);tonErfolgreich();};
    reg2(`RL-Trakt-${side}`,fn,`Traktion Schulter ${side}`);h.addEventListener('click',fn);}

   // AR/IR Winkel lateral
   const wDir=side==='L'?-1:1;
   const wBaseX=cx+wDir*(CR+GAP);

   {const wx=side==='L'?wBaseX:wBaseX-S,wy=cy-GAP/2;

    reg2(`RL-AR-${side}`,fn,`Außenrotation 90° Schulter ${side} RL`);h.addEventListener('click',fn);}

   {const wx=side==='L'?wBaseX:wBaseX-S,wy=cy+GAP/2;
    const anchorX=side==='L'?wx:wx+S;
    const l1=mkl(wx,wy,wx+S,wy);const l2=mkl(anchorX,wy,anchorX,wy+S);
    const h=hit(wx-4,wy-4,S+8,S+8);h.style.cursor='pointer';
    sm[`RL-IR-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-IR-${side}`);sm[`RL-IR-${side}`]=next;[l1,l2].forEach(l=>l.setAttribute('stroke',SCOL[next]));updateCircle();showSb(`Innenrotation 90° Schulter ${side} RL`,next);tonErfolgreich();};
    reg2(`RL-IR-${side}`,fn,`Innenrotation 90° Schulter ${side} RL`);h.addEventListener('click',fn);}

   // AR0 Winkel unter Traktionspfeil (mittig)
   {const dir=side==='L'?-1:1;
    const wx=cx,wy=cy+CR+14+12;
    const l1=mkl(wx,wy,wx,wy+S);
    const l2=mkl(wx,wy+S,wx+dir*S,wy+S);
    const lbl=el('text',{x:''+cx,y:''+(wy+S+8),'text-anchor':'middle','dominant-baseline':'middle','font-size':6,fill:'transparent','pointer-events':'none'});lbl.textContent='RL';svg.appendChild(lbl);
    const h=hit(wx+Math.min(0,dir*S)-4,wy-4,S+8,S+8);h.style.cursor='pointer';
    sm[`RL-AR0-${side}`]='neutral';
    const fn=()=>{const next=cs(`RL-AR0-${side}`);sm[`RL-AR0-${side}`]=next;[l1,l2].forEach(l=>l.setAttribute('stroke',SCOL[next]));lbl.setAttribute('fill',next==='neutral'?'transparent':SCOL[next]);updateCircle();showSb(`Außenrotation Nullstellung Schulter ${side} RL`,next);tonErfolgreich();};
    reg2(`RL-AR0-${side}`,fn,`Außenrotation Nullstellung Schulter ${side} RL`);h.addEventListener('click',fn);}


 }

 shoulderRL('L');shoulderRL('R');
}

 ['L','R'].forEach(side=>{

   {const y=ROT_Y_TOP, xCK=xCenter+dirAusen*40;

   {const y=ROT_Y_BOT, xStart=xCenter+dirAusen*arrowL/2, xEnd=xCenter-dirAusen*arrowL/2;

// Schulterblätter — Dreieck-Form + 5 Pfeile pro Seite zwischen Y1 und Y2
{const SCAP_Y=[Y1+8,Y1+22,Y1+40,Y1+56,Y1+64];
 const labels=['Kehle','Trachea','Ösophagus','Leber','Caudal'];
 const ids=['Rachen','Trachea','Oesoph','Leber','ScapCaudal'];
 ['L','R'].forEach(side=>{
   const SC_X=side==='L'?10:290;
   const dirIn=side==='L'?1:-1;
   const dirAusen=-dirIn;
   const baseX=CX+dirAusen*60;

   // Schulterblatt-Form: nach unten zulaufendes Dreieck mit Spina scapulae horizontal
   // Obere Basis bei Y1+8 (breit), Spitze bei Y1+72 (Angulus inferior)
   const scapTop=Y1+6,scapBot=Y1+58;
   const scapWidth=20; // halbe Breite der Basis oben
   // Lateraler Rand (außen)
   const xOuter=baseX-dirIn*30;
   const xInner=baseX+dirIn*10;
   const tipX=(xOuter+xInner)/2;
   // Dreieck: oben breit (xOuter bis xInner, Breite 40), Spitze unten in Mitte
   const scapPts=`${xOuter},${scapTop} ${xInner},${scapTop} ${tipX},${scapBot}`;
   el('polygon',{points:scapPts,fill:'none',stroke:COL,'stroke-width':1.5});
   // Spina scapulae — horizontale Linie auf Höhe Trachea-Pfeil
   const spinaY=Y1+22;
   const spinaXOuter=xOuter+(tipX-xOuter)*((spinaY-scapTop)/(scapBot-scapTop));
   const spinaXInner=xInner+(tipX-xInner)*((spinaY-scapTop)/(scapBot-scapTop));
   mkl(spinaXOuter,spinaY,spinaXInner,spinaY,{stroke:COL,'stroke-width':1});
   const aL=14,ts=5;

   // Erste 4 Pfeile: nach medial (Richtung Mitte = dirIn)
   for(let i=0;i<4;i++){
     const y=SCAP_Y[i];
     const id=`Scap-${ids[i]}-${side}`;
     const tProp=(y-scapTop)/(scapBot-scapTop);
     const xInnerY=xInner+(tipX-xInner)*tProp;
     const startX=xInnerY+dirIn*2;
     const endX=startX+dirIn*aL;
     const shaft=mkl(startX,y,endX-dirIn*ts,y);
     const tip=el('polygon',{points:`${endX},${y} ${endX-dirIn*ts},${y-ts/2} ${endX-dirIn*ts},${y+ts/2}`,fill:COL});
     const h=hit(Math.min(startX,endX)-4,y-7,Math.abs(endX-startX)+8,14);h.style.cursor='pointer';
     sm[id]='neutral';
     const fn=()=>{const next=cs(id);sm[id]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(`${labels[i]} ${side}`,next);tonErfolgreich();};
     reg2(id,fn,`${labels[i]} ${side}`);h.addEventListener('click',fn);
   }
   // 5. Pfeil: nach unten (Scapula caudal)
   {const y=SCAP_Y[4];
    const id=`Scap-${ids[4]}-${side}`;
    const shaft=mkl(tipX,y,tipX,y+aL-ts);
    const tip=el('polygon',{points:`${tipX},${y+aL} ${tipX-ts/2},${y+aL-ts} ${tipX+ts/2},${y+aL-ts}`,fill:COL});
    const h=hit(tipX-7,y-4,14,aL+8);h.style.cursor='pointer';
    sm[id]='neutral';
    const fn=()=>{const next=cs(id);sm[id]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(`Scapula ${side} caudal`,next);tonErfolgreich();};
    reg2(id,fn,`Scapula ${side} caudal`);h.addEventListener('click',fn);}
 });
}

// Sternum — 8-Form zwischen Y1 und Y2 mit 6 Pfeilen
{const SY=Y1+14,EY=Y2-10;
 const sCenter=(SY+EY)/2; // Mitte = Übergang Manubrium/Korpus
 const manuRX=13, manuRY=10; // Manubrium (kleiner)
 const korpRX=15, korpRY=14; // Korpus (etwas größer)
 const manuCY=SY+manuRY;
 const korpCY=manuCY+manuRY+korpRY; // direkt unter Manubrium, sich berührend

 // Manubrium — Achteck (Viereck mit abgeschnittenen Ecken)
 {const cx=CX,cy=manuCY,w=manuRX,h=manuRY,c=4; // c = Abschrägung
  const pts=`${cx-w+c},${cy-h} ${cx+w-c},${cy-h} ${cx+w},${cy-h+c} ${cx+w},${cy+h-c} ${cx+w-c},${cy+h} ${cx-w+c},${cy+h} ${cx-w},${cy+h-c} ${cx-w},${cy-h+c}`;
  el('polygon',{points:pts,fill:COL_BG,stroke:COL,'stroke-width':SW});}
 // Korpus — Achteck (etwas länger und breiter)
 {const cx=CX,cy=korpCY,w=korpRX,h=korpRY,c=5;
  const pts=`${cx-w+c},${cy-h} ${cx+w-c},${cy-h} ${cx+w},${cy-h+c} ${cx+w},${cy+h-c} ${cx+w-c},${cy+h} ${cx-w+c},${cy+h} ${cx-w},${cy+h-c} ${cx-w},${cy-h+c}`;
  el('polygon',{points:pts,fill:COL_BG,stroke:COL,'stroke-width':SW});}

 // Pfeile: 2 seitlich (groß), 2 oben in Manubrium, 2 unten in Korpus
 const aL=12,ts=5;
 ['L','R'].forEach(side=>{
   const dir=side==='L'?-1:1;

   // 1) Sternum seitlich groß (parallel zum Sternum, vertikal nach oben)
   {const sx=CX+dir*(Math.max(manuRX,korpRX)+5);
    const sy=korpCY+korpRY-2, ey=manuCY-manuRY+2;
    const shaft=mkl(sx,sy,sx,ey+3);
    const tip=el('polygon',{points:`${sx},${ey} ${sx-ts*0.6},${ey+4} ${sx+ts*0.6},${ey+4}`,fill:COL});
    sm[`Sternum-${side}`]='neutral';
    const h=hit(sx-6,ey-2,12,sy-ey+4);h.style.cursor='pointer';
    const fn=()=>{const next=cs(`Sternum-${side}`);sm[`Sternum-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(`Sternum Hochstand ${side}`,next);tonErfolgreich();};
    reg2(`Sternum-${side}`,fn,`Sternum Hochstand ${side}`);h.addEventListener('click',fn);}

   // 2) Manubrium Pfeil nach oben (parallel zum Sternum, innerhalb)
   {const mx=CX+dir*5, sy=manuCY+manuRY-3, ey=manuCY-manuRY+5;
    const shaft=mkl(mx,sy,mx,ey+3);
    const tip=el('polygon',{points:`${mx},${ey} ${mx-ts*0.5},${ey+3} ${mx+ts*0.5},${ey+3}`,fill:COL});
    const h=hit(mx-5,ey-2,10,sy-ey+4);h.style.cursor='pointer';
    sm[`Manubrium-${side}`]='neutral';
    const fn=()=>{const next=cs(`Manubrium-${side}`);sm[`Manubrium-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(`Manubrium Hochstand ${side}`,next);tonErfolgreich();};
    reg2(`Manubrium-${side}`,fn,`Manubrium Hochstand ${side}`);h.addEventListener('click',fn);}

   // 3) Korpus Pfeil nach unten (innerhalb Korpus)
   {const kx=CX+dir*5, sy=korpCY-korpRY+3, ey=korpCY+korpRY-5;
    const shaft=mkl(kx,sy,kx,ey-3);
    const tip=el('polygon',{points:`${kx},${ey} ${kx-ts*0.5},${ey-3} ${kx+ts*0.5},${ey-3}`,fill:COL});
    const h=hit(kx-5,sy-2,10,ey-sy+4);h.style.cursor='pointer';
    sm[`Korpus-${side}`]='neutral';
    const fn=()=>{const next=cs(`Korpus-${side}`);sm[`Korpus-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(`Korpus Tiefstand ${side}`,next);tonErfolgreich();};
    reg2(`Korpus-${side}`,fn,`Korpus Tiefstand ${side}`);h.addEventListener('click',fn);}
 });
}

function checkDuralAutoColor(){
  // Prüft ob alle Kurvaturen einer Seite (E,D,C,B,A,O,S,CV) eingefärbt sind
  const sides=['L','R'];
  const kurvIds=['E','D','C','B','A','O','S','CV'];
  for(const side of sides){
    const allColored=kurvIds.every(k=>sm[`${k}-${side}`]!=='neutral');
    if(allColored && sm[`Dural-${side}`]==='neutral'){
      // Färbe Durales Muster automatisch ein
      reg[`Dural-${side}`].cycle();
    }
  }
}

function handleSpeech(transcript){
  const t=transcript.toLowerCase().trim();
  document.getElementById('speechLog').textContent='Gehört: „'+transcript+'"';

  // Korrektur
  if(t.startsWith('korrektur ')){
    const rest=t.replace('korrektur ','');
    const sorted=[...speechMap].sort((a,b)=>b[0].length-a[0].length);
    for(const [phrase,id] of sorted){
      if(id.startsWith('__')) continue;
      if(rest.includes(phrase)&&reg[id]&&sm[id]!=='neutral'){
        sm[id]='restricted';reg[id].cycle();
        // SLR Text zurück auf "SLR"
        if(id.startsWith('SLR-')){
          const slrEl=svg.querySelector(`[data-slr="${id.slice(4)}"]`);
          if(slrEl) slrEl.textContent='SLR';
        }
        playTon(440,0.15);setTimeout(()=>playTon(340,0.2),160);
        showSb(reg[id].label+' — korrigiert','neutral');return;
      }
    }
    return;
  }

  // Tab-Wechsel
  const tabDirekt={'stand':'Stand','sitz':'Sitz','rückenlage':'Rück','rücken':'Rück','rippe':'Rippe','rippen':'Rippe'};
  if(tabDirekt[t]){
    document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.textContent===tabDirekt[t]));
    document.getElementById('sb').textContent='Wechsel zu: '+tabDirekt[t];
    tonErfolgreich();return;
  }

    // SLR mit Wert z.B. "SLR 70 links", auch "straight leg raise/race rechts 70"
  const slrMatch=t.match(/(?:slr|straight\s+leg\s+(?:raise|race))\s+(?:(\d+)\s*(?:°|grad)?\s*(links|rechts)|(links|rechts)\s+(\d+)\s*(?:°|grad)?)/);
  if(slrMatch){
    const wert=slrMatch[1]||slrMatch[4], seiteStr=slrMatch[2]||slrMatch[3];
    const seite=seiteStr==='links'?'L':'R';
    sm[`SLR-${seite}`]='restricted';
    const slrEl=svg.querySelector(`[data-slr="${seite}"]`);
    if(slrEl){slrEl.textContent='SLR '+wert+'°';slrEl.setAttribute('fill','#cc0000');}
    showSb('SLR '+wert+'° '+seite,'restricted');
    tonErfolgreich();
    return;
  }

    const sorted=[...speechMap].sort((a,b)=>b[0].length-a[0].length);
  for(const [phrase,id] of sorted){
    if(t.includes(phrase)){
      if(id.startsWith('__tab_')){
        const tab=id.replace('__tab_','');
        document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.textContent===tab));
        document.getElementById('sb').textContent='Wechsel zu: '+tab;
        tonErfolgreich();return;
      }
      if(reg[id]){
        if(sm[id]!=='neutral'){
          playTon(660,0.1);
          document.getElementById('speechLog').textContent='Bereits gesetzt: '+reg[id].label;
          return;
        }
        reg[id].cycle();checkDuralAutoColor();tonErfolgreich();return;
      }
    }
  }
  document.getElementById('speechLog').textContent='Nicht erkannt: „'+transcript+'"';
  playTon(150,0.6,'sawtooth');
}

// Mikrofon
let micRunning=false;
function setMicUI(state,text){
  document.getElementById('micDot').classList.toggle('active',state==='active');
  document.getElementById('micStatus').classList.toggle('listening',state==='active');
  document.getElementById('micText').textContent=text;
}
function startRecognition(){
  if(micRunning)return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){setMicUI('stopped','Spracherkennung nicht verfügbar');return;}
  micRunning=true;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onstart=()=>{
    setMicUI('active','Mikrofon aktiv — hört zu…');
    if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume();
    document.getElementById('audioBtn').textContent='🔔 Ton aktiv';
    document.getElementById('audioBtn').style.background='#f0fff0';
    document.getElementById('audioBtn').style.color='#336600';
  };
  recognition.onresult=(e)=>handleSpeech(e.results[e.results.length-1][0].transcript);
  recognition.onerror=(e)=>{micRunning=false;if(e.error==='not-allowed'){setMicUI('stopped','Mikrofon verweigert');return;}setTimeout(startRecognition,5000);};
  recognition.onend=()=>{micRunning=false;setTimeout(startRecognition,3000);setMicUI('stopped','Mikrofon kurz unterbrochen…');};
  try{recognition.start();}catch(e){micRunning=false;}
}
window.addEventListener('load',()=>setTimeout(startRecognition,1500));

function resetAll(){
  Object.keys(sm).forEach(k=>sm[k]='neutral');
  svg.querySelectorAll('line,path').forEach(e=>{
    if(e.getAttribute('stroke')==='transparent')return;
    e.setAttribute('stroke',e.getAttribute('stroke-dasharray')?COL_DASH:COL);
  });
  svg.querySelectorAll('polygon').forEach(p=>{
    if(p.getAttribute('fill')==='none')p.setAttribute('stroke',COL);
    else if(p.getAttribute('fill')!=='transparent')p.setAttribute('fill',COL);
  });
  svg.querySelectorAll('text').forEach(t=>{if(t.getAttribute('pointer-events')!=='none')t.setAttribute('fill',COL);});
  document.getElementById('sb').textContent='Alle zurückgesetzt';
}

function exportBefund(){
  const aktiv=Object.entries(sm).filter(([k,v])=>v!=='neutral').map(([k,v])=>{const r=reg[k];return r?`${r.label}: ${v}`:null;}).filter(Boolean);
  const text=aktiv.length?'Befund Rückenlage:\n'+aktiv.join('\n'):'Keine Befunde';
  const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');
  a.download='Befund_RL_'+new Date().toISOString().slice(0,10)+'.txt';a.href=URL.createObjectURL(blob);a.click();
}
