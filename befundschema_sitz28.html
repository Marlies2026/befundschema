<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Befundschema – Sitz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f0f0; color: #111; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 6px; }
h1 { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: #666; margin-bottom: 5px; }
.tabs { display: flex; gap: 4px; margin-bottom: 5px; flex-wrap: wrap; justify-content: center; }
.tab { font-size: 10px; padding: 4px 10px; border: 1px solid #bbb; border-radius: 4px; background: #fff; color: #666; cursor: pointer; letter-spacing: 1px; }
.tab.active { background: #222; color: #fff; border-color: #222; }
.legend { display: flex; gap: 10px; align-items: center; font-size: 10px; color: #666; margin-bottom: 5px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }
#schema-container { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 4px; margin-bottom: 5px; }
.status-bar { width: 100%; max-width: 420px; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 5px 10px; font-size: 11px; color: #666; min-height: 26px; margin-bottom: 4px; display: flex; align-items: center; }
.name { color: #111; font-weight: 600; }
.state-restricted { color: #cc0000; font-weight: 600; }
.state-free { color: #00aa33; font-weight: 600; }
.mic-status { width: 100%; max-width: 420px; background: #fff; border: 2px solid #ccc; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #666; min-height: 24px; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.mic-status.listening { border-color: #cc0000; background: #fff5f5; }
.mic-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.mic-dot.active { background: #cc0000; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.speech-log { width: 100%; max-width: 420px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 6px; padding: 3px 8px; font-size: 10px; color: #888; min-height: 20px; font-style: italic; margin-bottom: 3px; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; width: 100%; max-width: 420px; }
button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ccc; font-size: 11px; cursor: pointer; letter-spacing: 1px; background: #fff; color: #333; }
#micStartBtn { background: #fff0f0; color: #cc0000; border-color: #cc0000; display: none; }
#audioBtn { background: #fff0e0; color: #996600; border-color: #cc8800; }
#exportBtn { background: #f0fff0; color: #336600; border-color: #336600; }
#resetBtn { background: #fff8f0; color: #996600; border-color: #cc8800; }
.hint { font-size: 9px; color: #aaa; text-align: center; margin-bottom: 4px; }
</style>
</head>
<body>
<h1>Befundschema</h1>
<div class="tabs">
  <button class="tab" onclick="switchTab('Stand')">Stand</button>
  <button class="tab active" onclick="switchTab('Sitz')">Sitz</button>
  <button class="tab" onclick="switchTab('Rippe')">Rippe</button>
  <button class="tab" onclick="switchTab('Rück')">Rück</button>
  <button class="tab" onclick="switchTab('Zusatz')">Zusatz</button>
  <button class="tab" onclick="switchTab('Schädel')">Schädel</button>
</div>
<div class="legend">
  <span><span class="dot" style="background:#cc0000"></span>eingeschränkt</span>
  <span><span class="dot" style="background:#00aa33"></span>physiologisch</span>
</div>
<div id="schema-container">
  <svg id="sv" viewBox="-60 -70 430 560" style="display:block;width:100%;max-width:500px;background:#fff;"></svg>
</div>
<div class="status-bar" id="sb">Symbol antippen oder sprechen</div>
<div class="mic-status" id="micStatus">
  <span class="mic-dot" id="micDot"></span>
  <span id="micText">Mikrofon wird gestartet…</span>
</div>
<div class="speech-log" id="speechLog">Warte auf Spracheingabe…</div>
<p class="hint">1× = eingeschränkt/frei · 2× = zurücksetzen</p>
<div class="controls">
  <button id="micStartBtn" onclick="startRecognition()">🎤 Mikrofon starten</button>
  <button id="audioBtn" onclick="aktiviereAudio()">🔔 Ton aktivieren</button>
  <button id="exportBtn" onclick="exportBefund()">📸 Exportieren</button>
  <button id="resetBtn" onclick="resetAll()">↺ Zurücksetzen</button>
</div>

<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.textContent===name));
  document.getElementById('sb').textContent='Tab: '+name+' (wird geladen…)';
}

const svg=document.getElementById('sv');
const NS="http://www.w3.org/2000/svg";
const CX=150,SW=2;
const LX=50,RX=250;
const ANGLE=12,ARM=100;
const r=ANGLE*Math.PI/180;
const dx=ARM*Math.cos(r),dy=ARM*Math.sin(r);
const GAP=40,LGAP=80;
const CY_TOP=55;
const Y1=CY_TOP+GAP;    // Schultergürtel
const Y2=Y1+LGAP;       // Thorax
const Y3=Y2+LGAP;       // Becken
// Y4 wird dynamisch nach Sacrum/Coccyx berechnet
const SAC_T=50,COC_H=20;
const SAC_Y_BASE=Y3+LGAP/2; // Sacrum startet hier
const Y4=SAC_Y_BASE+SAC_T+6+COC_H; // Beckenbodenlinie = Coccyx-Spitze
const CY_BOT=Y4+GAP;
const SKOL_Y=(Y1+Y2)/2;
const WS_Y=(Y2+Y3)/2;
const PL=32,PR=268;
const TRI_L_X=LX+20,TRI_R_X=RX-20;
const HWS_D=28;
const HWS_Y=CY_TOP-dy-18;
const HWS_L_CX=CX-dx/2,HWS_R_CX=CX+dx/2;
const SC_L_X=10,SC_R_X=290,SC_Y=Y1;
const CR=14;
const LABEL_OFFSET=35;

// Sacrum/Coccyx Konstanten werden im SVG-Aufbau definiert

const COL='#222222',COL_DASH='#aaaaaa',COL_BG='#ffffff';
const STATES=['neutral','restricted','free'];
const LABELS={neutral:'neutral',restricted:'eingeschränkt',free:'frei (physiologisch)'};
const SCOL={neutral:COL,restricted:'#cc0000',improved:'#cc8800',free:'#00aa33'};
const FCOL={neutral:COL,restricted:'#cc0000',improved:'#cc8800',free:'#00aa33'};
const DCOL={neutral:COL_DASH,restricted:'#cc0000',free:'#00aa33'};
const sm={};
const reg={};
const lineFns={};

function el(tag,attrs){const e=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));svg.appendChild(e);return e;}
function cs(id){return sm[id]==='neutral'?'restricted':'neutral';}
function csPhysio(id){return sm[id]==='neutral'?'free':'neutral';}
function reg2(id,fn,label){sm[id]='neutral';reg[id]={cycle:fn,label};}
function showSb(label,state){
  const sb=document.getElementById('sb');
  if(state==='neutral')sb.innerHTML=label+' — zurückgesetzt';
  else{const cls='state-'+state;sb.innerHTML=`<span class="name">${label}</span> → <span class="${cls}">${LABELS[state]}</span>`;}
}
function mkl(x1,y1,x2,y2,extra={}){return el('line',{x1,y1,x2,y2,stroke:COL,'stroke-width':SW,'stroke-linecap':'round',...extra});}
function hit(x,y,w,h){return el('rect',{x,y,width:w,height:h,fill:'transparent'});}
function stxt(x,y,s,sz=8){const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':sz,fill:'#666','pointer-events':'none'});t.textContent=s;return t;}

// Audio
let audioCtx=null;
function playTon(freq,dauer,typ='sine'){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.type=typ;osc.frequency.setValueAtTime(freq,audioCtx.currentTime);
    gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dauer);
    osc.start();osc.stop(audioCtx.currentTime+dauer);
  }catch(e){}
}
function tonErfolgreich(){playTon(523,0.12,'sine');setTimeout(()=>playTon(784,0.12,'sine'),130);setTimeout(()=>playTon(1047,0.15,'sine'),260);}
function tonNichtErkannt(){playTon(150,0.6,'sawtooth');}
function aktiviereAudio(){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    audioCtx.resume().then(()=>{
      const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();
      osc.connect(gain);gain.connect(audioCtx.destination);
      osc.frequency.value=880;gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
      osc.start();osc.stop(audioCtx.currentTime+0.3);
      document.getElementById('audioBtn').textContent='🔔 Ton aktiv';
      document.getElementById('audioBtn').style.background='#f0fff0';
      document.getElementById('audioBtn').style.color='#336600';
    });
  }catch(e){}
}

// Hilfsfunktionen
function circle(id,x,y,label){
  sm[id]='neutral';
  const c=el('circle',{cx:x,cy:y,r:CR,fill:COL_BG,stroke:COL,'stroke-width':SW});
  c.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;c.setAttribute('stroke',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);c.addEventListener('click',fn);return c;
}

function hlineDir(idL,idR,y,labelL,labelR,physioSide){
  const linie=mkl(LX,y,RX,y);
  const s=8;
  const ptsL=`${LX-s},${y} ${LX},${y-s*.6} ${LX},${y+s*.6}`;
  const ptsR=`${RX+s},${y} ${RX},${y-s*.6} ${RX},${y+s*.6}`;
  const triL=el('polygon',{points:ptsL,fill:'none',stroke:COL,'stroke-width':1.5});
  const triR=el('polygon',{points:ptsR,fill:'none',stroke:COL,'stroke-width':1.5});
  sm[idL]='neutral';sm[idR]='neutral';
  const hL=hit(LX-s-4,y-s-4,s*2+8,s*2+8);hL.style.cursor='pointer';
  const hR=hit(RX-s-4,y-s-4,s*2+8,s*2+8);hR.style.cursor='pointer';
  const colorBoth=(next)=>{linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);};
  const cycL=(physio=false)=>{
    const next=physio&&physioSide==='L'?csPhysio(idL):cs(idL);sm[idL]=next;sm[idR]='neutral';
    triR.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);
    showSb(labelL,next);tonErfolgreich();
  };
  const cycR=(physio=false)=>{
    const next=physio&&physioSide==='R'?csPhysio(idR):cs(idR);sm[idR]=next;sm[idL]='neutral';
    triL.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);
    showSb(labelR,next);tonErfolgreich();
  };
  lineFns[idL]=colorBoth;
  reg2(idL,()=>cycL(true),labelL);reg2(idR,()=>cycR(true),labelR);
  hL.addEventListener('click',()=>cycL(true));
  hR.addEventListener('click',()=>cycR(true));
}

function hlineDirSimple(idL,idR,y,labelL,labelR){
  const linie=mkl(LX,y,RX,y);
  const s=8;
  const ptsL=`${LX-s},${y} ${LX},${y-s*.6} ${LX},${y+s*.6}`;
  const ptsR=`${RX+s},${y} ${RX},${y-s*.6} ${RX},${y+s*.6}`;
  const triL=el('polygon',{points:ptsL,fill:'none',stroke:COL,'stroke-width':1.5});
  const triR=el('polygon',{points:ptsR,fill:'none',stroke:COL,'stroke-width':1.5});
  sm[idL]='neutral';sm[idR]='neutral';
  const hL=hit(LX-s-4,y-s-4,s*2+8,s*2+8);hL.style.cursor='pointer';
  const hR=hit(RX-s-4,y-s-4,s*2+8,s*2+8);hR.style.cursor='pointer';
  const colorBoth=(next)=>{linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);};
  const cycL=()=>{const next=cs(idL);sm[idL]=next;sm[idR]='neutral';triR.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triL.setAttribute('stroke',SCOL[next]);showSb(labelL,next);tonErfolgreich();};
  const cycR=()=>{const next=cs(idR);sm[idR]=next;sm[idL]='neutral';triL.setAttribute('stroke',COL);linie.setAttribute('stroke',SCOL[next]);triR.setAttribute('stroke',SCOL[next]);showSb(labelR,next);tonErfolgreich();};
  lineFns[idL]=colorBoth;
  reg2(idL,cycL,labelL);reg2(idR,cycR,labelR);
  hL.addEventListener('click',cycL);hR.addEventListener('click',cycR);
}

function makeWendepunkt(id,idL,idR,label){
  sm[id]='neutral';
  const fn=()=>{const next=cs(id);sm[id]=next;sm[idL]=next;sm[idR]=next;if(lineFns[idL])lineFns[idL](next);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);
}

function plusMark(id,x,y,label){
  const t=el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:COL});
  t.style.cursor='pointer';t.textContent='+';svg.appendChild(t);
  const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',FCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);t.addEventListener('click',fn);return t;
}

function cross2(idA,idB,my,labelA,labelB){
  const lA1=mkl(CX,my,CX-dx,my+dy),lA2=mkl(CX,my,CX+dx,my-dy);
  const lB1=mkl(CX,my,CX-dx,my-dy),lB2=mkl(CX,my,CX+dx,my+dy);
  sm[idA]='neutral';sm[idB]='neutral';
  const hA1=el('line',{x1:CX,y1:my,x2:CX-dx,y2:my+dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hA2=el('line',{x1:CX,y1:my,x2:CX+dx,y2:my-dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hB1=el('line',{x1:CX,y1:my,x2:CX-dx,y2:my-dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const hB2=el('line',{x1:CX,y1:my,x2:CX+dx,y2:my+dy,stroke:'transparent','stroke-width':14,'stroke-linecap':'round'});
  const fnA=()=>{const next=cs(idA);sm[idA]=next;[lA1,lA2].forEach(l=>l.setAttribute('stroke',SCOL[next]));showSb(labelA,next);tonErfolgreich();};
  const fnB=()=>{const next=cs(idB);sm[idB]=next;[lB1,lB2].forEach(l=>l.setAttribute('stroke',SCOL[next]));showSb(labelB,next);tonErfolgreich();};
  reg2(idA,fnA,labelA);reg2(idB,fnB,labelB);
  [hA1,hA2].forEach(h=>{h.style.cursor='pointer';h.addEventListener('click',fnA);});
  [hB1,hB2].forEach(h=>{h.style.cursor='pointer';h.addEventListener('click',fnB);});
}

function dashLine(id,cx,cy,dir,label,posLabel){
  sm[id]='neutral';const half=HWS_D/2;
  const l=dir==='/'
    ?el('line',{x1:cx-half,y1:cy+half,x2:cx+half,y2:cy-half,stroke:COL_DASH,'stroke-width':SW,'stroke-linecap':'round','stroke-dasharray':'4,3'})
    :el('line',{x1:cx-half,y1:cy-half,x2:cx+half,y2:cy+half,stroke:COL_DASH,'stroke-width':SW,'stroke-linecap':'round','stroke-dasharray':'4,3'});
  // Positionsbuchstabe (z.B. S, ST, RL) — nur sichtbar wenn eingefärbt
  const lbl=posLabel?el('text',{x:''+cx,y:''+(cy+half+8),'text-anchor':'middle','dominant-baseline':'middle','font-size':6,fill:'transparent','pointer-events':'none'}):null;
  if(lbl){lbl.textContent=posLabel;svg.appendChild(lbl);}
  const h=hit(cx-half-6,cy-half-6,HWS_D+12,HWS_D+12);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;const col=next==='neutral'?COL_DASH:SCOL[next];l.setAttribute('stroke',col);if(lbl)lbl.setAttribute('fill',next==='neutral'?'transparent':col);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function hwsRot(id,cx,cy,arcDir,triDir,label,posLabel){
  sm[id]='neutral';const R=12,ts=6;const sweep=arcDir==='right'?1:0;
  const arc=el('path',{d:`M ${cx} ${cy-R} A ${R} ${R} 0 0 ${sweep} ${cx} ${cy+R}`,fill:'none',stroke:COL_DASH,'stroke-width':SW,'stroke-dasharray':'4,3'});
  const triPts=triDir==='right'?`${cx+ts},${cy} ${cx-ts/2},${cy-ts} ${cx-ts/2},${cy+ts}`:`${cx-ts},${cy} ${cx+ts/2},${cy-ts} ${cx+ts/2},${cy+ts}`;
  const triEl=el('polygon',{points:triPts,fill:COL_DASH,stroke:'none'});
  const lbl=posLabel?el('text',{x:''+cx,y:''+(cy+R+8),'text-anchor':'middle','dominant-baseline':'middle','font-size':6,fill:'transparent','pointer-events':'none'}):null;
  if(lbl){lbl.textContent=posLabel;svg.appendChild(lbl);}
  const h=hit(cx-R-6,cy-R-6,R*2+12,R*2+12);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;const col=next==='neutral'?COL_DASH:SCOL[next];arc.setAttribute('stroke',col);triEl.setAttribute('fill',col);if(lbl)lbl.setAttribute('fill',next==='neutral'?'transparent':col);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function splitEllipse(idL,idR,yTop,yBot,labelL,labelR){
  const cy=(yTop+yBot)/2,ry=(yBot-yTop)/2,rx=12;
  const pL=el('path',{d:`M ${CX} ${cy-ry} A ${rx} ${ry} 0 0 0 ${CX} ${cy+ry}`,fill:'none',stroke:COL_DASH,'stroke-width':1.5,'stroke-dasharray':'4,3'});
  const pR=el('path',{d:`M ${CX} ${cy-ry} A ${rx} ${ry} 0 0 1 ${CX} ${cy+ry}`,fill:'none',stroke:COL_DASH,'stroke-width':1.5,'stroke-dasharray':'4,3'});
  const hL=hit(CX-rx-4,cy-ry-4,rx+4,ry*2+8),hR=hit(CX,cy-ry-4,rx+4,ry*2+8);
  hL.style.cursor='pointer';hR.style.cursor='pointer';sm[idL]='neutral';sm[idR]='neutral';
  const fnL=()=>{const next=cs(idL);sm[idL]=next;pL.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(labelL,next);tonErfolgreich();};
  const fnR=()=>{const next=cs(idR);sm[idR]=next;pR.setAttribute('stroke',next==='neutral'?COL_DASH:SCOL[next]);showSb(labelR,next);tonErfolgreich();};
  reg2(idL,fnL,labelL);reg2(idR,fnR,labelR);
  hL.addEventListener('click',fnL);hR.addEventListener('click',fnR);
}

function makeArrow(id,x,y,dir,label){
  sm[id]='neutral';
  const L=14,TS=6;
  let shaft,tip;
  if(dir==='left'){shaft=mkl(x,y,x-L,y);tip=el('polygon',{points:`${x-L},${y} ${x-L+TS},${y-TS/2} ${x-L+TS},${y+TS/2}`,fill:COL});}
  else if(dir==='right'){shaft=mkl(x,y,x+L,y);tip=el('polygon',{points:`${x+L},${y} ${x+L-TS},${y-TS/2} ${x+L-TS},${y+TS/2}`,fill:COL});}
  else if(dir==='up'){shaft=mkl(x,y,x,y-L);tip=el('polygon',{points:`${x},${y-L} ${x-TS/2},${y-L+TS} ${x+TS/2},${y-L+TS}`,fill:COL});}
  else{shaft=mkl(x,y,x,y+L);tip=el('polygon',{points:`${x},${y+L} ${x-TS/2},${y+L-TS} ${x+TS/2},${y+L-TS}`,fill:COL});}
  const h=hit(x-10,y-10,20,20);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
  return {shaft,tip};
}

function makeRightAngle(id,cx,cy,mirror,label,showLabel){
  sm[id]='neutral';
  const S=10;
  let l1,l2;
  if(!mirror){
    l1=mkl(cx,cy,cx+S,cy);l2=mkl(cx+S,cy,cx+S,cy+S);
  } else {
    l1=mkl(cx,cy,cx-S,cy);l2=mkl(cx-S,cy,cx-S,cy+S);
  }
  const h=hit(cx-S-4,cy-4,S*2+8,S+8);h.style.cursor='pointer';
  const posLabel=showLabel?el('text',{x:cx+(mirror?-S-4:S+4),y:cy+S/2,'text-anchor':mirror?'end':'start','dominant-baseline':'middle','font-size':7,fill:'transparent','pointer-events':'none'}):null;
  if(posLabel){posLabel.textContent=label.includes('Innen')?'S':'S';svg.appendChild(posLabel);}
  const fn=()=>{
    const next=cs(id);sm[id]=next;
    [l1,l2].forEach(l=>l.setAttribute('stroke',SCOL[next]));
    if(posLabel)posLabel.setAttribute('fill',next==='neutral'?'transparent':SCOL[next]);
    showSb(label,next);tonErfolgreich();
  };
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function makeElevLine(id,cx,cy,side,label){
  sm[id]='neutral';
  const dX=14,dY=14;
  const l=side==='L'
    ?mkl(cx,cy,cx-dX,cy+dY)
    :mkl(cx,cy,cx+dX,cy+dY);
  const h=hit(cx-dX-4,cy-4,dX*2+8,dY+8);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;l.setAttribute('stroke',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

// Schulterkreis Sitz
function shoulderCircleSitz(side){
  const cx=side==='L'?SC_L_X:SC_R_X,cy=SC_Y;
  const S=16,GAP=18;

  function updateCircle(){
    const tests=[`F-${side}`,`ABD-${side}`,`KIR-${side}`,`KAR-${side}`,
      `Retraktion-${side}`,`Protraktion-${side}`,`Adduktion-${side}`,
      `Elevation-${side}`,`AR-${side}`,`IR-${side}`,`AR0-${side}`,`Extension-${side}`];
    const active=tests.find(id=>sm[id]&&sm[id]!=='neutral');
    if(active) circ.setAttribute('stroke',SCOL[sm[active]]);
    else circ.setAttribute('stroke',COL);
  }

  // Kreis
  sm[`Schulter-${side}`]='neutral';
  const circ=el('circle',{cx,cy,r:CR,fill:COL_BG,stroke:COL,'stroke-width':SW});
  circ.style.cursor='pointer';
  const circFn=()=>{const next=cs(`Schulter-${side}`);sm[`Schulter-${side}`]=next;circ.setAttribute('stroke',SCOL[next]);showSb(`Schulter ${side}`,next);tonErfolgreich();};
  reg2(`Schulter-${side}`,circFn,`Schulter ${side}`);circ.addEventListener('click',circFn);

  // Elevationslinie durch Kreis: L=\, R=/
  {const d=CR*.7;
   const l=side==='L'?mkl(cx-d,cy-d,cx+d,cy+d):mkl(cx-d,cy+d,cx+d,cy-d);
   const h=hit(cx-CR,cy-CR,CR*2,CR*2);h.style.cursor='pointer';
   sm[`Elevation-${side}`]='neutral';
   const fn=()=>{const next=cs(`Elevation-${side}`);sm[`Elevation-${side}`]=next;l.setAttribute('stroke',SCOL[next]);updateCircle();showSb(`Elevationseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`Elevation-${side}`,fn,`Elevationseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // F über dem Aufwärtspfeil
  {const t=el('text',{x:''+cx,y:''+(cy-CR-28),'text-anchor':'middle','dominant-baseline':'middle','font-size':10,fill:COL});
   t.style.cursor='pointer';t.textContent='F';svg.appendChild(t);
   sm[`F-${side}`]='neutral';
   const fn=()=>{const next=cs(`F-${side}`);sm[`F-${side}`]=next;t.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Flexion Schulter ${side}`,next);tonErfolgreich();};
   reg2(`F-${side}`,fn,`Flexion Schulter ${side}`);t.addEventListener('click',fn);}

  // ↑ Pfeil oben = Retraktionseinschränkung
  {const shaft=mkl(cx,cy-CR,cx,cy-CR-14);
   const tip=el('polygon',{points:`${cx},${cy-CR-14} ${cx-4},${cy-CR-9} ${cx+4},${cy-CR-9}`,fill:COL});
   const h=hit(cx-8,cy-CR-18,16,18);h.style.cursor='pointer';
   sm[`Retraktion-${side}`]='neutral';
   const fn=()=>{const next=cs(`Retraktion-${side}`);sm[`Retraktion-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Retraktionseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`Retraktion-${side}`,fn,`Retraktionseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // Seitlicher Pfeil + ABD: L←, R→
  {const dir=side==='L'?-1:1;
   const tipX=cx+dir*(CR+14);
   const shaft=mkl(cx+dir*CR,cy,tipX,cy);
   const tip=side==='L'
     ?el('polygon',{points:`${tipX},${cy} ${tipX+5},${cy-4} ${tipX+5},${cy+4}`,fill:COL})
     :el('polygon',{points:`${tipX},${cy} ${tipX-5},${cy-4} ${tipX-5},${cy+4}`,fill:COL});
   const abdX=side==='L'?tipX-10:tipX+10;
   const abdT=el('text',{x:''+abdX,y:''+cy,'text-anchor':side==='L'?'end':'start','dominant-baseline':'middle','font-size':7,fill:COL});
   abdT.textContent='ABD';svg.appendChild(abdT);
   const h=side==='L'?hit(tipX-4,cy-8,18,16):hit(cx+CR,cy-8,18,16);h.style.cursor='pointer';
   sm[`ABD-${side}`]='neutral';
   const fn=()=>{const next=cs(`ABD-${side}`);sm[`ABD-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);abdT.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Adduktionseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`ABD-${side}`,fn,`Adduktionseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // ↓ Pfeil unten = Protraktionseinschränkung
  {const shaft=mkl(cx,cy+CR,cx,cy+CR+14);
   const tip=el('polygon',{points:`${cx},${cy+CR+14} ${cx-4},${cy+CR+9} ${cx+4},${cy+CR+9}`,fill:COL});
   const h=hit(cx-8,cy+CR,16,18);h.style.cursor='pointer';
   sm[`Protraktion-${side}`]='neutral';
   const fn=()=>{const next=cs(`Protraktion-${side}`);sm[`Protraktion-${side}`]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);updateCircle();showSb(`Protraktionseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`Protraktion-${side}`,fn,`Protraktionseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // AR0 Winkel — unter ↓ Pfeil, nach unten + außen
  {const dir=side==='L'?-1:1;
   const wx=cx,wy=cy+CR+14+14;
   const l1=mkl(wx,wy,wx,wy+S);
   const l2=mkl(wx,wy+S,wx+dir*S,wy+S);
   const h=hit(wx+Math.min(0,dir*S)-4,wy-4,S+8,S+8);h.style.cursor='pointer';
   // S-Label unter AR0 Winkel
   const ar0Lbl=el('text',{x:''+cx,y:''+(wy+S+8),'text-anchor':'middle','dominant-baseline':'middle','font-size':6,fill:'transparent','pointer-events':'none'});
   ar0Lbl.textContent='S';svg.appendChild(ar0Lbl);
   sm[`AR0-${side}`]='neutral';
   const fn=()=>{const next=cs(`AR0-${side}`);sm[`AR0-${side}`]=next;const col=SCOL[next];[l1,l2].forEach(l=>l.setAttribute('stroke',col));ar0Lbl.setAttribute('fill',next==='neutral'?'transparent':col);updateCircle();showSb(`Außenrotation Nullstellung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`AR0-${side}`,fn,`Außenrotation Nullstellung Schulter ${side}`);h.addEventListener('click',fn);}

  // KIR/KAR — in Verlängerung des ABD Pfeils (Pfeilspitze x)
  {const dir2=side==='L'?-1:1;
   const kirX=cx+dir2*(CR+14);
   ['KIR','KAR'].forEach((label,i)=>{
    const t=el('text',{x:''+kirX,y:''+(cy+CR+28+i*10),'text-anchor':'middle','dominant-baseline':'middle','font-size':7,fill:COL});
    t.style.cursor='pointer';t.textContent=label;svg.appendChild(t);
    const id=`${label}-${side}`;sm[id]='neutral';
    const fn=()=>{const next=cs(id);sm[id]=next;t.setAttribute('fill',SCOL[next]);updateCircle();showSb(`${label==='KIR'?'Komplette Innenrotation':'Komplette Außenrotation'} Schulter ${side}`,next);tonErfolgreich();};
    reg2(id,fn,`${label==='KIR'?'Komplette Innenrotation':'Komplette Außenrotation'} Schulter ${side}`);t.addEventListener('click',fn);
  });}

  // AR/IR Winkel lateral
  const wDir=side==='L'?-1:1;
  const wBaseX=cx+wDir*(CR+GAP);

  // AR — waagerecht + senkrecht nach oben
  {const wx=side==='L'?wBaseX:wBaseX-S,wy=cy-GAP/2;
   const anchorX=side==='L'?wx:wx+S;
   const l1=mkl(wx,wy,wx+S,wy);
   const l2=mkl(anchorX,wy,anchorX,wy-S);
   const h=hit(wx-4,wy-S-4,S+8,S+8);h.style.cursor='pointer';
   sm[`AR-${side}`]='neutral';
   const fn=()=>{const next=cs(`AR-${side}`);sm[`AR-${side}`]=next;[l1,l2].forEach(l=>l.setAttribute('stroke',SCOL[next]));updateCircle();showSb(`Außenrotationseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`AR-${side}`,fn,`Außenrotationseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // IR — waagerecht + senkrecht nach unten
  {const wx=side==='L'?wBaseX:wBaseX-S,wy=cy+GAP/2;
   const anchorX=side==='L'?wx:wx+S;
   const l1=mkl(wx,wy,wx+S,wy);
   const l2=mkl(anchorX,wy,anchorX,wy+S);
   const h=hit(wx-4,wy-4,S+8,S+8);h.style.cursor='pointer';
   sm[`IR-${side}`]='neutral';
   const fn=()=>{const next=cs(`IR-${side}`);sm[`IR-${side}`]=next;[l1,l2].forEach(l=>l.setAttribute('stroke',SCOL[next]));updateCircle();showSb(`Innenrotationseinschränkung Schulter ${side}`,next);tonErfolgreich();};
   reg2(`IR-${side}`,fn,`Innenrotationseinschränkung Schulter ${side}`);h.addEventListener('click',fn);}

  // Extension — symmetrisch, beide von unten-innen nach oben-außen
  {const dX=20,dY=20;
   const extMidX=CX+(cx-CX)*0.35;
   // L: von rechts-unten (innen) nach links-oben (außen)
   // R: von links-unten (innen) nach rechts-oben (außen)
   const l=side==='L'
     ?mkl(extMidX+dX/2,Y1,extMidX-dX/2,Y1-dY)
     :mkl(extMidX-dX/2,Y1,extMidX+dX/2,Y1-dY);
   const h=hit(extMidX-dX/2-4,Y1-dY-4,dX+8,dY+8);h.style.cursor='pointer';
   sm[`Extension-${side}`]='neutral';
   const fn=()=>{const next=cs(`Extension-${side}`);sm[`Extension-${side}`]=next;l.setAttribute('stroke',SCOL[next]);showSb(`Extension Schulter ${side} eingeschränkt`,next);tonErfolgreich();};
   reg2(`Extension-${side}`,fn,`Extension Schulter ${side} eingeschränkt`);h.addEventListener('click',fn);}
}

function makeBracketArrow(id,cx,cy,dir,label){
  sm[id]='neutral';

  else{shaft=mkl(cx-PL2+2,cy,cx+PL2-TS,cy);tip=el('polygon',{points:`${cx+PL2},${cy} ${cx+PL2-TS},${cy-TS/2} ${cx+PL2-TS},${cy+TS/2}`,fill:COL});}
  const h=el('rect',{x:cx-PL2-6,y:cy-8,width:PL2*2+12,height:16,fill:'transparent'});h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;const col=next==='neutral'?COL:SCOL[next];[tL,tR].forEach(t=>t.setAttribute('fill',col));shaft.setAttribute('stroke',col);tip.setAttribute('fill',col);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function coccyxArrow(id,cx,cy,dir,label){

  const h=hit(cx-10,cy-10,20,20);h.style.cursor='pointer';
  const fn=()=>{const next=cs(id);sm[id]=next;shaft.setAttribute('stroke',SCOL[next]);tip.setAttribute('fill',SCOL[next]);showSb(label,next);tonErfolgreich();};
  reg2(id,fn,label);h.addEventListener('click',fn);
}

function handleSpeech(transcript){
  const t=transcript.toLowerCase().trim();
  document.getElementById('speechLog').textContent='Gehört: „'+transcript+'"';

  // Tab-Wechsel
  const tabDirekt={'stand':'Stand','sitz':'Sitz','rückenlage':'Rück','rücken':'Rück','rippe':'Rippe','rippen':'Rippe'};
  if(tabDirekt[t]){
    const tab=tabDirekt[t];
    document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.textContent===tab));
    document.getElementById('sb').textContent='Wechsel zu: '+tab;
    tonErfolgreich();return;
  }

  // FFA mit Wert
  const ffaMatch=t.match(/(?:ffa|finger.{0,20}abstand)\s+(\d+)/);
  if(ffaMatch){showSb('FFA: '+ffaMatch[1]+' cm','restricted');tonErfolgreich();return;}

  // Sortiert nach Länge
  const sortedMap=[...speechMap].sort((a,b)=>b[0].length-a[0].length);
  for(const [phrase,id] of sortedMap){
    if(t.includes(phrase)){
      if(id.startsWith('__tab_')){
        const tab=id.replace('__tab_','');
        document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.textContent===tab));
        document.getElementById('sb').textContent='Wechsel zu: '+tab;
        tonErfolgreich();return;
      }
      if(reg[id]){reg[id].cycle();return;}
    }
  }
  document.getElementById('speechLog').textContent='Nicht erkannt: „'+transcript+'" — bitte Symbol antippen';
  tonNichtErkannt();
}

// Spracherkennung
let micRunning=false;
function setMicUI(state,text){
  document.getElementById('micDot').classList.toggle('active',state==='active');
  document.getElementById('micStatus').classList.toggle('listening',state==='active');
  document.getElementById('micText').textContent=text;
  document.getElementById('micStartBtn').style.display=state==='stopped'?'inline-block':'none';
}
function startRecognition(){
  if(micRunning)return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){setMicUI('stopped','Spracherkennung nicht verfügbar');return;}
  micRunning=true;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const recognition=new SR();
  recognition.lang='de-DE';recognition.continuous=true;recognition.interimResults=false;
  recognition.onstart=()=>{
    setMicUI('active','Mikrofon aktiv — hört zu…');
    if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
    if(audioCtx&&audioCtx.state==='suspended'){audioCtx.resume();}
    document.getElementById('audioBtn').textContent='🔔 Ton aktiv';
    document.getElementById('audioBtn').style.background='#f0fff0';
    document.getElementById('audioBtn').style.color='#336600';
  };
  recognition.onresult=(e)=>handleSpeech(e.results[e.results.length-1][0].transcript);
  recognition.onerror=(e)=>{micRunning=false;if(e.error==='not-allowed'){setMicUI('stopped','Mikrofon-Zugriff verweigert');return;}setMicUI('stopped','Kurze Pause…');setTimeout(startRecognition,5000);};
  recognition.onend=()=>{micRunning=false;setTimeout(startRecognition,3000);setMicUI('stopped','Mikrofon kurz unterbrochen…');};
  try{recognition.start();}catch(e){micRunning=false;setMicUI('stopped','Fehler');}
}
window.addEventListener('load',()=>setTimeout(startRecognition,1500));

function resetAll(){
  Object.keys(sm).forEach(k=>sm[k]='neutral');
  svg.querySelectorAll('line').forEach(l=>{if(l.getAttribute('stroke')==='transparent')return;if(l.getAttribute('stroke-dasharray'))l.setAttribute('stroke',COL_DASH);else l.setAttribute('stroke',COL);});
  svg.querySelectorAll('path').forEach(p=>{if(p.getAttribute('stroke-dasharray'))p.setAttribute('stroke',COL_DASH);else p.setAttribute('stroke',COL);});
  svg.querySelectorAll('polygon').forEach(p=>{if(p.getAttribute('fill')==='none')p.setAttribute('stroke',COL);else if(p.getAttribute('fill')==='transparent')return;else p.setAttribute('fill',COL);});
  svg.querySelectorAll('circle').forEach(c=>{c.setAttribute('fill',COL_BG);c.setAttribute('stroke',COL);});
  svg.querySelectorAll('text').forEach(t=>{if(t.getAttribute('pointer-events')==='none')return;t.setAttribute('fill',COL);});
  document.getElementById('sb').textContent='Alle zurückgesetzt';
}

function exportBefund(){
  const aktiv=Object.entries(sm).filter(([k,v])=>v!=='neutral').map(([k,v])=>{const r=reg[k];return r?`${r.label}: ${LABELS[v]}`:null;}).filter(Boolean);
  const text=aktiv.length>0?'Befund Sitz:\n'+aktiv.join('\n'):'Keine Befunde dokumentiert';
  try{
    const svgEl=document.getElementById('sv');const svgData=new XMLSerializer().serializeToString(svgEl);
    const canvas=document.createElement('canvas');canvas.width=400;canvas.height=750;
    const ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,400,750);
    const img=new Image();const blob=new Blob([svgData],{type:'image/svg+xml'});const url=URL.createObjectURL(blob);
    img.onload=()=>{ctx.drawImage(img,40,20,320,710);const a=document.createElement('a');a.download='Befund_Sitz_'+new Date().toISOString().slice(0,10)+'.png';a.href=canvas.toDataURL('image/png');a.click();URL.revokeObjectURL(url);};
    img.src=url;
  }catch(e){const blob=new Blob([text],{type:'text/plain'});const a=document.createElement('a');a.download='Befund_Sitz_'+new Date().toISOString().slice(0,10)+'.txt';a.href=URL.createObjectURL(blob);a.click();}
}
